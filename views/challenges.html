<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missions - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; }
    .missions-container { max-width: 1000px; margin: 4rem auto; }
    .mission-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .mission-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 1.5rem; transition: 0.3s; position: relative; overflow: hidden; }
    .mission-card:hover { border-color: var(--neon-cyan); transform: translateY(-3px); }
    .mission-card.solved { border-left: 4px solid var(--neon-cyan); }
    .mission-card.solved::after { content: 'SOLVED'; position: absolute; top: 10px; right: -25px; background: var(--neon-cyan); color: #000; font-size: 10px; font-weight: bold; padding: 2px 30px; transform: rotate(45deg); }
    .mission-title { color: #fff; font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; display: block; }
    .mission-desc { color: #626e84; font-size: 0.9rem; margin-bottom: 1.5rem; min-height: 3rem; }
    .mission-meta { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1c2126; padding-top: 1rem; }
    .mission-difficulty { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .diff-easy { color: var(--neon-cyan); }
    .diff-medium { color: var(--neon-yellow); }
    .diff-hard { color: var(--neon-pink); }
    .btn-launch { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 0.4rem 1rem; border-radius: 4px; text-decoration: none; font-size: 12px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
    .btn-launch:hover { background: var(--neon-cyan); color: #000; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/act.png" alt="Logo" style="height: 32px; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges" class="active">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser"><span class="nav-user-badge">Connecting...</span></div>
  </nav>

  <main class="main-content">
    <div class="missions-container">
      <header style="margin-bottom: 3rem; border-left: 4px solid var(--neon-cyan); padding-left: 1.5rem;">
        <h1 style="font-family: 'Orbitron', sans-serif; color: #fff; font-size: 2rem;">MISSIONS_CONTROL</h1>
        <p style="color: #626e84;">Select a target to initiate exploitation procedures.</p>
      </header>

      <div id="missionsGrid" class="mission-grid">
        <div class="spinner" style="grid-column: span 3; margin: 5rem auto;"></div>
      </div>
    </div>
  </main>

  <script>
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }

    async function loadMissions() {
      try {
        const res = await fetch('/api/challenges/progress/me');
        const data = await res.json();
        const grid = document.getElementById('missionsGrid');
        if (data.success) {
          grid.innerHTML = data.challenges.map(c => {
            const isSolved = c.solved_at !== null;
            const title = escapeHtml(c.title);
            const description = escapeHtml(c.description || 'Intercept and exploit vulnerabilities in this environment.');
            const difficulty = escapeHtml(c.difficulty);
            const difficultyClass = escapeHtml(String(c.difficulty || '').toLowerCase());
            const endpoint = escapeHtml(c.endpoint);
            const points = escapeHtml(c.points);
            return `
              <div class="mission-card ${isSolved ? 'solved' : ''}">
                <div class="mission-title">${title}</div>
                <div class="mission-desc">${description}</div>
                <div class="mission-meta">
                  <span class="mission-difficulty diff-${difficultyClass}">${difficulty}</span>
                  <span style="color: var(--neon-cyan); font-family: 'Share Tech Mono'; font-weight: bold;">${points} PTS</span>
                  <div style="display: flex; align-items: center; gap: 10px;">
                    ${isSolved ? '<span style="color:var(--neon-cyan); font-size:10px; font-weight:bold; border: 1px solid var(--neon-cyan); padding: 2px 5px; border-radius: 3px;">SOLVED</span>' : ''}
                    <a href="${endpoint}" class="btn-launch">Launch</a>
                  </div>
                </div>
              </div>
            `;
          }).join('');
        }
      } catch (err) {}
    }
    async function initStatus() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        const u = data.user || { username: 'Guest', score: 0, role: 'user' };
        
        // Dynamic Navbar based on Role (Priv-Esc Demo)
        const isAdmin = u.role === 'admin' || document.cookie.includes('role=admin');
        
        let navHtml = `<span class="nav-user-badge">Status: ${u.username} (${u.score} PTS)</span>`;
        if (isAdmin) {
          navHtml = `<a href="/admin" class="nav-user-badge" style="border-color:var(--neon-pink); color:var(--neon-pink); text-decoration:none; animation: pulse 1s infinite;">⚠️ ADMIN_ACCESS_GRANTED</a> ` + navHtml;
        }
        
        document.getElementById('navUser').innerHTML = navHtml;
        if (typeof loadMissions === 'function') loadMissions();
      } catch (err) {}
    }
    initStatus();
  </script>
</body>
</html>
