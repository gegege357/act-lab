<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missions - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges" class="active">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="container" style="max-width: 1000px;">
      <div class="page-header" style="text-align:center; margin-bottom: 2rem;">
        <h1 style="font-size: 2rem; letter-spacing: 2px;">MISSION LIST</h1>
        <p class="text-dim text-mono">Select a target to begin deployment</p>
      </div>

      <div class="flex gap-2 mb-4 justify-center" style="flex-wrap:wrap;" id="filterBtns">
        <button class="btn btn-sm btn-primary" data-cat="all" onclick="filter('all', this)">ALL</button>
        <button class="btn btn-sm btn-secondary" data-cat="SQL Injection" onclick="filter('SQL Injection', this)">SQLi</button>
        <button class="btn btn-sm btn-secondary" data-cat="XSS" onclick="filter('XSS', this)">XSS</button>
        <button class="btn btn-sm btn-secondary" data-cat="CSRF" onclick="filter('CSRF', this)">CSRF</button>
        <button class="btn btn-sm btn-secondary" data-cat="IDOR" onclick="filter('IDOR', this)">IDOR</button>
      </div>

      <div id="list" style="display:grid; grid-template-columns: repeat(auto-fill,minmax(290px,1fr)); gap:1.2rem;"></div>
    </div>
  </main>

  <script>
    let all = [], solved = new Set(), cur = 'all';

    const DIFF_COLOR = { Easy: 'var(--neon-green)', Medium: 'var(--neon-yellow)', Hard: 'var(--neon-pink)' };

    async function init() {
      // Auth
      try {
        let r = await fetch('/api/auth/status');
        let d = await r.json();
        if (!d.authenticated) d = await (await fetch('/api/auth/auto-login', {method:'POST'})).json();
        document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${d.user.username}</span><button class="nav-logout" onclick="logout()">Logout</button>`;
      } catch(e) {}

      // Load challenges (hardcoded on server — always works)
      try {
        const r = await fetch('/api/challenges');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        if (d.success) {
            all = d.challenges;
        } else {
            throw new Error(d.error || 'Unknown error');
        }
      } catch(e) {
        console.error('API Error:', e);
        document.getElementById('list').innerHTML = `
            <div class="card p-4 text-center" style="grid-column:1/-1; border-color:var(--neon-pink);">
                <div class="text-pink mb-2">⚠️ SERVER CONNECTION ERROR</div>
                <div class="text-dim text-xs">${e.message}</div>
                <button class="btn btn-xs btn-secondary mt-3" onclick="location.reload()">RETRY CONNECTION</button>
            </div>`;
        return;
      }

      // Load progress (optional, ignore failures)
      try {
        const r = await fetch('/api/challenges/progress/me');
        const d = await r.json();
        if (d.success) d.challenges.forEach(c => { if (c.solved_at) solved.add(c.id); });
      } catch(e) {}

      render();
    }

    function render() {
      const list = document.getElementById('list');
      const data = cur === 'all' ? all : all.filter(c => c.category === cur);

      if (!data.length) {
        list.innerHTML = '<div class="card p-4 text-center text-dim" style="grid-column:1/-1">No missions found.</div>';
        return;
      }

      list.innerHTML = data.map(c => {
        const s = solved.has(c.id);
        return `
        <div class="card" style="padding:1.2rem;display:flex;flex-direction:column;border-color:${s?'var(--neon-green)':'var(--border-color)'};">
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs uppercase" style="color:${DIFF_COLOR[c.difficulty]||'#888'}">${c.difficulty}</span>
            ${s ? '<span style="font-size:10px;color:var(--neon-green);">✓ SOLVED</span>' : ''}
          </div>
          <h3 style="font-size:.95rem;margin-bottom:.4rem;color:${s?'var(--neon-green)':'white'}">${c.title}</h3>
          <p class="text-secondary" style="font-size:11px;line-height:1.5;flex-grow:1;margin-bottom:1rem">${c.description}</p>
          <div class="flex justify-between items-center">
            <span style="font-size:11px;color:var(--neon-yellow);font-family:'Orbitron',sans-serif">${c.points} XP</span>
            <a href="${c.endpoint}" class="btn btn-xs ${s?'btn-secondary':'btn-primary'}" style="padding:4px 12px;font-size:10px">${s?'REVIEW':'DEPLOY'}</a>
          </div>
        </div>`;
      }).join('');
    }

    function filter(cat, btn) {
      cur = cat;
      document.querySelectorAll('#filterBtns button').forEach(b => {
        b.className = 'btn btn-sm ' + (b.getAttribute('data-cat') === cat ? 'btn-primary' : 'btn-secondary');
      });
      render();
    }

    function logout() { fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/'); }
    init();
  </script>
</body>
</html>
