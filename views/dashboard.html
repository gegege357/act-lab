<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; }
    .htb-dashboard { max-width: 1200px; margin: 4rem auto; display: grid; grid-template-columns: 1fr 3fr; gap: 2rem; }
    .profile-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 2rem; text-align: center; }
    .profile-avatar { width: 100px; height: 100px; background: #0b0e11; border: 2px solid var(--neon-cyan); border-radius: 4px; margin: 0 auto 1.5rem auto; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; color: var(--neon-cyan); }
    .profile-name { color: #fff; font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; }
    .profile-score { color: var(--neon-cyan); font-family: 'Share Tech Mono'; font-size: 1.2rem; letter-spacing: 2px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 1.5rem; border-left: 4px solid var(--neon-cyan); }
    .stat-label { color: #626e84; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .stat-value { color: #fff; font-size: 1.8rem; font-weight: bold; font-family: 'Share Tech Mono'; }
    .missions-list { background: #15191d; border: 1px solid #23282f; border-radius: 4px; overflow: hidden; }
    .missions-header { background: #1c2126; padding: 1rem 1.5rem; border-bottom: 1px solid #23282f; color: #fff; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    .mission-item { padding: 1.2rem 1.5rem; border-bottom: 1px solid #1c2126; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
    .mission-item:hover { background: rgba(159,239,0,0.02); }
    .mission-info { flex: 1; }
    .mission-title { color: #fff; font-weight: bold; margin-bottom: 4px; }
    .mission-meta { color: #626e84; font-size: 11px; text-transform: uppercase; }
    .mission-points { font-family: 'Share Tech Mono'; color: var(--neon-green); font-weight: bold; margin: 0 2rem; }
    .btn-pwn { background: #0b0e11; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none; font-size: 12px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
    .btn-pwn:hover { background: var(--neon-cyan); color: #000; }
    .solved-badge { color: var(--neon-cyan); font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
    @media (max-width: 900px) { .htb-dashboard { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/act.png" alt="Logo" style="height: 32px; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser"><span class="nav-user-badge">Connecting...</span></div>
  </nav>
  <main class="main-content">
    <div class="htb-dashboard">
      <aside>
        <div class="profile-card">
          <div class="profile-avatar" id="avatarChar">?</div>
          <div class="profile-name" id="profileName">Loading...</div>
          <div class="profile-score" id="profileScore">0 PTS</div>
          <div style="margin-top: 2rem; border-top: 1px solid #23282f; padding-top: 1.5rem;">
            <p style="color: #626e84; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">Session: Active</p>
          </div>
        </div>
      </aside>
      <section>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">Missions Solved</div><div class="stat-value" id="statSolved">0 / 8</div></div>
          <div class="stat-card" style="border-left-color: var(--neon-cyan);"><div class="stat-label">Global Rank</div><div class="stat-value" id="statRank">#--</div></div>
          <div class="stat-card" style="border-left-color: var(--neon-yellow);"><div class="stat-label">Account Type</div><div class="stat-value" id="statRole">USER</div></div>
        </div>
        <div class="missions-list"><div class="missions-header">Available Missions</div><div id="missionsContainer"><div class="spinner" style="margin: 3rem auto;"></div></div></div>
      </section>
    </div>
  </main>
  <script>
    async function initStatus() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        
        const u = data.user || { username: 'Guest', score: 0, role: 'user' };
        document.getElementById('profileName').textContent = u.username;
        document.getElementById('profileScore').textContent = `${u.score || 0} PTS`;
        document.getElementById('avatarChar').textContent = u.username[0].toUpperCase();
        document.getElementById('statRole').textContent = (u.role || 'USER').toUpperCase();
        
        if (data.success && !u.username.startsWith('guest_')) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge" style="border-color:var(--neon-cyan); color:var(--neon-cyan);">Operator: ${u.username} (Score: ${u.score})</span>`;
        } else {
          document.getElementById('navUser').innerHTML = `
            <span class="nav-user-badge" style="margin-right:10px;">Guest (Score: ${u.score})</span>
            <a href="/login" class="nav-user-badge" style="text-decoration:none; border-color:var(--neon-green); color:var(--neon-green);">Sign In</a>
          `;
        }
        
        loadMissions();
      } catch (err) { loadMissions(); }
    }
    initStatus();
    async function loadMissions() {
      try {
        const res = await fetch('/api/challenges/progress/me');
        const data = await res.json();
        const container = document.getElementById('missionsContainer');
        if (data.success) {
          const solvedCount = data.solved;
          document.getElementById('statSolved').textContent = `${solvedCount} / ${data.total}`;
          container.innerHTML = data.challenges.map(c => {
            const isSolved = c.solved_at !== null;
            return `
              <div class="mission-item">
                <div class="mission-info"><div class="mission-title">${c.title}</div><div class="mission-meta">${c.category} | ${c.difficulty}</div></div>
                <div class="mission-points" style="color:var(--neon-cyan);">${c.points} PTS</div>
                <div style="display: flex; align-items: center; gap: 10px;">
                  ${isSolved ? `<span class="solved-badge" style="font-size: 10px;">✓ SOLVED</span>` : ''}
                  <a href="${c.endpoint}" class="btn-pwn">Launch</a>
                </div>
              </div>`;
          }).join('');
        }
      } catch (err) {}
    }
    async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/login'; }
    initDashboard();
  </script>
</body>
</html>
