<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guestbook - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Challenges</a></li>
      <li><a href="/search">Search Lab</a></li>
      <li><a href="/guestbook" class="active">Guestbook</a></li>
      <li><a href="/redirect">Redirect Lab</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <a href="/login" class="btn btn-primary btn-sm">Login</a>
    </div>
    <button class="mobile-menu-btn" onclick="document.getElementById('navLinks').classList.toggle('open')">&#9776;</button>
  </nav>

  <main class="main-content">
    <div class="container" style="max-width: 800px;">
      <div class="page-header">
        <h1>// GUESTBOOK</h1>
        <p>Leave your mark on the community</p>
      </div>

      <!-- Add Entry Form -->
      <div class="card mb-3">
        <div class="card-title mb-2">POST MESSAGE</div>
        <form onsubmit="postEntry(event)">
          <div class="form-group">
            <label for="author" class="form-label">Author Name:</label>
            <input type="text" class="form-input" id="author" placeholder="Your name" maxlength="100" required>
          </div>
          <div class="form-group">
            <label for="message" class="form-label">Message:</label>
            <textarea class="form-input" id="message" placeholder="Your message..." rows="4" maxlength="2000" required></textarea>
          </div>
          <button type="submit" class="btn btn-success btn-block" id="postBtn">POST MESSAGE</button>
        </form>
        <div id="postResult" class="mt-2" style="display:none;"></div>
      </div>

      <!-- Entries List -->
      <div class="card">
        <div class="card-title mb-2">ENTRIES</div>
        <div id="entriesList" style="max-height: 600px; overflow-y: auto;">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p class="footer-text">ACT LAB &copy; 2024 | Educational Purpose Only</p>
    </footer>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function loadEntries() {
      try {
        const res = await fetch('/api/guestbook');
        const data = await res.json();

        if (data.success && data.entries.length > 0) {
          let html = '';
          data.entries.forEach((entry) => {
            const date = new Date(entry.created_at).toLocaleString();
            html += `
              <div class="guestbook-entry">
                <div class="guestbook-entry-header">
                  <span class="guestbook-entry-author">${escapeHtml(entry.author)}</span>
                  <span class="guestbook-entry-time">${date}</span>
                </div>
                <div class="guestbook-entry-message" id="msg-${entry.id}"></div>
              </div>
            `;
          });
          
          document.getElementById('entriesList').innerHTML = html;
          
          // *** VULNERABLE: Using innerHTML without escaping ***
          // This is where the Stored XSS executes!
          data.entries.forEach((entry) => {
            document.getElementById(`msg-${entry.id}`).innerHTML = entry.message;
          });
        } else {
          document.getElementById('entriesList').innerHTML = '<div class="empty-state"><div class="empty-state-text">No entries yet. Be the first to post!</div></div>';
        }
      } catch (err) {
        document.getElementById('entriesList').innerHTML = '<div class="empty-state"><div class="empty-state-text">Failed to load entries</div></div>';
      }
    }

    async function postEntry(e) {
      e.preventDefault();
      
      const author = document.getElementById('author').value;
      const message = document.getElementById('message').value;
      const btn = document.getElementById('postBtn');
      const resultDiv = document.getElementById('postResult');

      if (!author || !message) {
        showToast('Author and message are required', 'error');
        return;
      }

      btn.textContent = 'POSTING...';
      btn.disabled = true;

      try {
        const formData = new URLSearchParams();
        formData.append('author', author);
        formData.append('message', message);

        const res = await fetch('/api/guestbook', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });

        const data = await res.json();

        if (data.success) {
          resultDiv.style.display = 'block';
          resultDiv.innerHTML = `<div style="background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.4); border-radius:8px; padding:14px; color:var(--neon-green); font-weight:600;">&#9989; ${data.message}</div>`;
          
          document.getElementById('author').value = '';
          document.getElementById('message').value = '';
          
          showToast('Message posted successfully', 'success');
          
          setTimeout(() => {
            resultDiv.style.display = 'none';
            loadEntries();
          }, 2000);
        } else {
          resultDiv.style.display = 'block';
          resultDiv.innerHTML = `<div style="background:rgba(255,0,102,0.1); border:1px solid rgba(255,0,102,0.4); border-radius:8px; padding:14px; color:var(--neon-pink); font-weight:600;">&#9888; ${data.error}</div>`;
        }
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      } finally {
        btn.textContent = 'POST MESSAGE';
        btn.disabled = false;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // Check auth and auto-login if needed
    async function initAuth() {
      try {
        let res = await fetch('/api/auth/status');
        let data = await res.json();

        if (!data.authenticated) {
          const autoRes = await fetch('/api/auth/auto-login', { method: 'POST' });
          data = await autoRes.json();
        }

        if (data.success) {
          // Set dummy flag cookie for XSS challenge
          document.cookie = "session_flag=ACT{st0r3d_xss_p3rs1st3nt}; path=/guestbook; max-age=3600";
          
          document.getElementById('navUser').innerHTML = `
            <span class="nav-user-badge">${escapeHtml(data.user.username)}</span>
            <a href="/dashboard" class="btn btn-primary btn-sm">Dashboard</a>
            <button class="nav-logout" onclick="logout()">Logout</button>
          `;
          loadEntries();
        }
      } catch (err) {
        console.error('Auth error:', err);
      }
    }

    function logout() {
      fetch('/api/auth/logout', { method: 'POST' }).then(() => window.location.href = '/');
    }

    initAuth();
  </script>
</body>
</html>
