<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACT LAB - National Seminar Edition</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; display: flex; flex-direction: column; min-height: 100vh; }
    .hero-section { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; position: relative; overflow: hidden; }
    .hero-content { max-width: 800px; z-index: 2; }
    .hero-title { font-family: 'Orbitron', sans-serif; font-size: 4rem; color: #fff; margin-bottom: 1rem; letter-spacing: 4px; }
    .hero-subtitle { color: var(--neon-green); font-family: 'Share Tech Mono', monospace; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 3rem; text-transform: uppercase; }
    .hero-btn-group { display: flex; gap: 1.5rem; justify-content: center; }
    .btn-hero { padding: 1rem 2.5rem; font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; border-radius: 4px; transition: 0.3s; text-decoration: none; }
    .btn-hero-primary { background: var(--neon-green); color: #000; }
    .btn-hero-primary:hover { background: #8cd600; box-shadow: 0 0 20px rgba(159,239,0,0.4); }
    .btn-hero-secondary { background: transparent; border: 1px solid #23282f; color: #fff; }
    .btn-hero-secondary:hover { border-color: var(--neon-green); color: var(--neon-green); }
    .cyber-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(159,239,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(159,239,0,0.05) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg) translateY(-100px); transform-origin: top; z-index: 1; opacity: 0.3; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/act.png" alt="Logo" style="height: 32px; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard" class="nav-user-badge" style="background: var(--neon-green); color: #000; border:none; font-weight:bold;">ENTER LAB</a></li>
    </ul>
  </nav>

  <main class="hero-section">
    <div class="cyber-grid"></div>
    <div class="hero-content">
      <div style="color: var(--neon-green); font-size: 12px; font-weight: bold; letter-spacing: 5px; margin-bottom: 1rem;">SYSTEM_ONLINE :: v4.2.0</div>
      <h1 class="hero-title">ACT LAB</h1>
      <p class="hero-subtitle">Professional Cybersecurity Training & Exploitation Environment</p>
      <div class="hero-btn-group">
        <a href="/dashboard" class="btn-hero btn-hero-primary">Launch Dashboard</a>
        <a href="/challenges" class="btn-hero btn-hero-secondary">View Missions</a>
      </div>
    </div>
  </main>

  <footer style="padding: 2rem; text-align: center; color: #626e84; font-size: 12px; font-family: 'Share Tech Mono';">
    &copy; 2026 ACT LAB :: SECURE_ENVIRONMENT :: ACCESS_GRANTED
  </footer>
</body>
</html>
