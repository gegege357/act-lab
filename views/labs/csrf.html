<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSRF Lab - ACT LAB (HTB Edition)</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; }
    .htb-container { max-width: 900px; margin: 4rem auto; }
    .machine-header { border-left: 4px solid var(--neon-green); padding-left: 1.5rem; margin-bottom: 3rem; }
    .machine-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: #fff; }
    
    .htb-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 2.5rem; margin-bottom: 2rem; }
    .htb-card-title { font-size: 1rem; color: var(--neon-green); font-weight: bold; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #23282f; padding-bottom: 0.75rem; }
    
    .htb-input { 
      background: #0b0e11; 
      border: 1px solid #23282f; 
      color: #fff; 
      font-size: 1rem; 
      padding: 0.8rem; 
      width: 100%; 
      border-radius: 4px; 
      font-family: 'Share Tech Mono', monospace; 
      margin-top: 0.5rem;
    }
    .htb-input:focus { border-color: var(--neon-green); outline: none; }
    .htb-btn { 
      background: var(--neon-green); 
      color: #000; 
      font-weight: bold; 
      padding: 1rem; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      width: 100%;
      margin-top: 1rem;
    }

    .htb-terminal { background: #050505; border: 1px solid #1c2126; border-radius: 4px; font-family: 'Share Tech Mono', monospace; margin-bottom: 2rem; overflow: hidden; }
    .htb-terminal-header { background: #15191d; padding: 6px 12px; color: #626e84; font-size: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #1c2126; }
    .htb-terminal-body { padding: 1rem; color: var(--neon-yellow); font-size: 12px; line-height: 1.5; height: 150px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="cyber-bg" style="opacity: 0.05;"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="htb-container">
      <!-- HEADER -->
      <header class="machine-header">
        <h1 class="machine-title">CROSS-SITE REQUEST FORGERY</h1>
        <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">PHASE: STATE-CHANGING ACTION MANIPULATION</p>
      </header>

      <!-- TRAFFIC MONITOR -->
      <div class="htb-terminal">
        <div class="htb-terminal-header">
          <span>HTTP TRAFFIC MONITORING :: SNIFFER ACTIVE</span>
          <span>root@act-sniff:~#</span>
        </div>
        <div class="htb-terminal-body" id="trafficLog">
          <div>Listening for cross-origin POST requests...</div>
        </div>
      </div>

      <!-- TARGET CARD -->
      <section class="htb-card">
        <h2 class="htb-card-title">Target: Account Management</h2>
        
        <div id="profileView" style="margin-bottom: 2rem; background: #0b0e11; padding: 1.5rem; border-radius: 4px; border-left: 3px solid var(--neon-green);">
          <div class="spinner"></div>
        </div>

        <form onsubmit="updateProfile(event)">
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label class="form-label">New Email Address</label>
            <input type="email" id="emailInput" class="htb-input" placeholder="attacker@mail.com" required>
          </div>
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label class="form-label">New Biography</label>
            <textarea id="bioInput" class="htb-input" rows="3" placeholder="Injected content..."></textarea>
          </div>
          <button type="submit" class="htb-btn">Update Profile</button>
        </form>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function loadProfile() {
      try {
        const res = await fetch('/api/profile/me');
        const data = await res.json();
        if (data.success) {
          const u = data.user;
          document.getElementById('profileView').innerHTML = `
            <div style="display: flex; align-items: center; gap: 1rem;">
              <div class="nav-logo-icon" style="width: 40px; height: 40px; font-size: 16px;">${u.username[0].toUpperCase()}</div>
              <div>
                <div style="font-weight: bold; color: #fff;">${u.username}</div>
                <div style="font-size: 11px; color: #626e84; text-transform: uppercase;">${u.role} | ${u.email || 'NO_EMAIL'}</div>
              </div>
            </div>
          `;
          document.getElementById('emailInput').value = u.email || '';
          document.getElementById('bioInput').value = u.bio || '';
        }
      } catch (err) {}
    }

    async function updateProfile(e) {
      if (e) e.preventDefault();
      const email = document.getElementById('emailInput').value;
      const bio = document.getElementById('bioInput').value;
      addLog('INBOUND', `POST /api/profile | Source: ${window.location.origin}`);

      try {
        const res = await fetch('/api/profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, bio })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Updated!', 'success');
          addLog('SUCCESS', `DB updated. New Email: ${email}`);
          if (data.message && data.message.includes('ACT{')) showFlag(data.message);
          loadProfile();
        } else {
          showToast(data.error || 'Failed', 'error');
          addLog('REJECTED', `Origin check blocked request: ${data.error}`);
        }
      } catch (err) { addLog('ERROR', 'Network error'); }
    }

    function addLog(type, msg) {
      const log = document.getElementById('trafficLog');
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.style.marginBottom = '4px';
      div.innerHTML = `<span style="color: #626e84;">[${time}]</span> <span style="font-weight: bold;">[${type}]</span> ${msg}`;
      log.prepend(div);
    }

    function showFlag(msg) {
      const flag = msg.split('Flag: ')[1];
      showToast('Machine Compromised!', 'success');
      addLog('EXPLOIT', `CSRF Triggered. Captured Flag: ${flag}`);
      alert('SUCCESS! FLAG CAPTURED: ' + flag);
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        let res = await fetch('/api/auth/status');
        let data = await res.json();
        if (!data.authenticated) {
          const autoRes = await fetch('/api/auth/auto-login', { method: 'POST' });
          data = await autoRes.json();
        }
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
          loadProfile();
        }
      } catch (err) {}
    }
    initAuth();
  </script>
</body>
</html>
