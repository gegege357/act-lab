<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSRF Lab - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .lab-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .terminal-window {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid var(--neon-cyan);
      border-radius: 8px;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }
    .terminal-header {
      background: var(--neon-cyan);
      color: black;
      padding: 5px 15px;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }
    .terminal-body {
      padding: 15px;
      height: 150px;
      overflow-y: auto;
      font-size: 13px;
      color: #0f0;
      line-height: 1.5;
    }
    .log-entry { margin-bottom: 5px; }
    .log-time { color: var(--neon-cyan); margin-right: 10px; }
  </style>
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="lab-container">
      <div class="page-header" style="text-align:center;">
        <h1 style="color: var(--neon-yellow); margin-bottom: 0.5rem;">CSRF CHALLENGE</h1>
        <p class="text-mono">Target: Vulnerable Profile Update Form</p>
      </div>

      <!-- MAIN LAB CARD -->
      <div class="card" style="padding: 2rem; border-color: var(--neon-yellow);">
        <div class="flex justify-between items-center mb-4">
          <div class="text-xs uppercase text-dim">Profile Management System</div>
          <div class="text-xs text-yellow">SECURITY: WEAK ORIGIN CHECK</div>
        </div>
        
        <div id="profileView" class="mb-4">
          <div class="spinner"></div>
        </div>

        <form onsubmit="updateProfile(event)" class="flex flex-column gap-3">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="emailInput" class="form-input" placeholder="Enter new email...">
          </div>
          <div class="form-group">
            <label class="form-label">Biography</label>
            <textarea id="bioInput" class="form-input" rows="3" placeholder="Tell us about yourself..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block" style="background:var(--neon-yellow); border-color:var(--neon-yellow); color:black; font-weight:bold; padding: 12px; font-size: 1rem;">
            SAVE CHANGES
          </button>
        </form>
      </div>

      <!-- LIVE LOGS TERMINAL -->
      <div class="terminal-window">
        <div class="terminal-header">
          <span>LIVE TRAFFIC MONITOR</span>
          <span>● ACTIVE</span>
        </div>
        <div class="terminal-body" id="trafficLog">
          <div class="log-entry"><span class="log-time">[SYSTEM]</span> Awaiting inbound requests...</div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function loadProfile() {
      try {
        const res = await fetch('/api/profile/me');
        const data = await res.json();
        if (data.success) {
          const u = data.user;
          document.getElementById('profileView').innerHTML = `
            <div class="flex items-center gap-4">
              <div class="avatar-placeholder" style="width: 50px; height: 50px; font-size: 20px; background: var(--neon-yellow); color: black;">${u.username[0].toUpperCase()}</div>
              <div>
                <div class="text-lg font-bold white">${u.username}</div>
                <div class="text-dim text-xs uppercase letter-spacing-1">${u.role} | Score: ${u.score}</div>
              </div>
            </div>
          `;
          document.getElementById('emailInput').value = u.email || '';
          document.getElementById('bioInput').value = u.bio || '';
        }
      } catch (err) {
        addLog('ERROR', 'Failed to fetch profile data');
      }
    }

    async function updateProfile(e) {
      if (e) e.preventDefault();
      const email = document.getElementById('emailInput').value;
      const bio = document.getElementById('bioInput').value;
      
      addLog('INBOUND', `POST /api/profile | Origin: ${window.location.origin}`);

      try {
        const res = await fetch('/api/profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, bio })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Profile updated!', 'success');
          addLog('SUCCESS', `DB modified. New email: ${email}`);
          if (data.message && data.message.includes('ACT{')) showFlag(data.message);
          loadProfile();
        } else {
          showToast(data.error || 'Update failed', 'error');
          addLog('REJECTED', data.error || 'Validation failed');
        }
      } catch (err) {
        addLog('ERROR', 'Network connection failure');
      }
    }

    function addLog(type, msg) {
      const log = document.getElementById('trafficLog');
      const time = new Date().toLocaleTimeString();
      const color = type === 'SUCCESS' ? '#0f0' : (type === 'REJECTED' || type === 'ERROR' ? '#f00' : '#0ff');
      
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">[${time}]</span> <span style="color: ${color}">[${type}]</span> ${msg}`;
      
      log.prepend(entry);
    }

    function showFlag(msg) {
      const flag = msg.split('Flag: ')[1];
      showToast('FLAG FOUND!', 'success');
      addLog('CONGRATS', `Captured Flag: ${flag}`);
      alert('SUCCESS! FLAG: ' + flag);
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        let res = await fetch('/api/auth/status');
        let data = await res.json();
        if (!data.authenticated) {
          const autoRes = await fetch('/api/auth/auto-login', { method: 'POST' });
          data = await autoRes.json();
        }
        if (data.success) {
          document.getElementById('navUser').innerHTML = `
            <span class="nav-user-badge">${data.user.username}</span>
            <button class="nav-logout" onclick="logout()">Logout</button>
          `;
          loadProfile();
        }
      } catch (err) {}
    }
    initAuth();
    function logout() { fetch('/api/auth/logout', { method: 'POST' }).then(() => window.location.href = '/'); }
  </script>
</body>
</html>
