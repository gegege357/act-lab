<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSRF Lab - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="container" style="max-width: 800px;">
      <!-- HEADER -->
      <header style="text-align: center; margin-bottom: 3rem;">
        <div class="badge badge-csrf">MISSION: CROSS-SITE FORGERY</div>
        <h1 class="hero-title" style="font-size: 3rem; margin-top: 1rem;">CSRF CHALLENGE</h1>
        <p class="text-secondary">Execute unauthorized actions by bypassing origin validation logic.</p>
      </header>

      <!-- TRAFFIC MONITOR -->
      <section class="terminal" style="margin-bottom: 2rem;">
        <div class="terminal-header">
          <div class="terminal-dot red"></div>
          <div class="terminal-title">HTTP TRAFFIC MONITOR</div>
        </div>
        <div class="terminal-body" id="trafficLog" style="font-size: 13px; color: var(--neon-yellow);">
          Awaiting inbound cross-site requests...
        </div>
      </section>

      <!-- TARGET PROFILE -->
      <section class="card">
        <div class="card-header">
          <h2 class="card-title">Target: Account Management</h2>
          <span class="badge badge-medium">WEAK ORIGIN CHECK</span>
        </div>
        
        <div id="profileView" style="margin-bottom: 2rem; padding: 1.5rem; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid var(--border-color);">
          <div class="spinner" style="margin: 0 auto;"></div>
        </div>

        <form onsubmit="updateProfile(event)">
          <div class="form-group">
            <label class="form-label">New Email Address</label>
            <input type="email" id="emailInput" class="form-input" placeholder="user@target.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">New Biography</label>
            <textarea id="bioInput" class="form-input" rows="3" placeholder="Update profile bio..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">UPDATE PROFILE</button>
        </form>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function loadProfile() {
      try {
        const res = await fetch('/api/profile/me');
        const data = await res.json();
        if (data.success) {
          const u = data.user;
          document.getElementById('profileView').innerHTML = `
            <div style="display: flex; align-items: center; gap: 1rem;">
              <div class="nav-logo-icon" style="width: 48px; height: 48px; font-size: 20px;">${u.username[0].toUpperCase()}</div>
              <div>
                <div style="font-weight: bold; color: white; font-size: 1.1rem;">${u.username}</div>
                <div style="font-size: 12px; color: var(--text-dim); text-transform: uppercase;">${u.role} | Current Email: ${u.email || 'N/A'}</div>
              </div>
            </div>
          `;
          document.getElementById('emailInput').value = u.email || '';
          document.getElementById('bioInput').value = u.bio || '';
        }
      } catch (err) {}
    }

    async function updateProfile(e) {
      if (e) e.preventDefault();
      const email = document.getElementById('emailInput').value;
      const bio = document.getElementById('bioInput').value;
      addLog('INBOUND', `POST /api/profile | Origin: ${window.location.origin}`);

      try {
        const res = await fetch('/api/profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, bio })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Updated!', 'success');
          addLog('SUCCESS', `Modified. New Email: ${email}`);
          if (data.message && data.message.includes('ACT{')) showFlag(data.message);
          loadProfile();
        } else {
          showToast(data.error || 'Failed', 'error');
          addLog('REJECTED', `Origin check failed: ${data.error}`);
        }
      } catch (err) { addLog('ERROR', 'System error'); }
    }

    function addLog(type, msg) {
      const log = document.getElementById('trafficLog');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.innerHTML = `<span style="color: var(--text-dim);">[${time}]</span> <span style="color: var(--neon-yellow); font-weight: bold;">[${type}]</span> ${msg}`;
      log.prepend(entry);
    }

    function showFlag(msg) {
      const flag = msg.split('Flag: ')[1];
      showToast('FLAG CAPTURED!', 'success');
      alert('SUCCESS! CSRF Exploit Successful.\nFLAG: ' + flag);
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        let res = await fetch('/api/auth/status');
        let data = await res.json();
        if (!data.authenticated) {
          const autoRes = await fetch('/api/auth/auto-login', { method: 'POST' });
          data = await autoRes.json();
        }
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
          loadProfile();
        }
      } catch (err) {}
    }
    initAuth();
  </script>
</body>
</html>
