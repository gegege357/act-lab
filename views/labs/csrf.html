<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSRF Lab - ACT LAB (HTB Edition)</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; }
    .htb-container { max-width: 900px; margin: 4rem auto; }
    .machine-header { border-left: 4px solid var(--neon-cyan); padding-left: 1.5rem; margin-bottom: 3rem; }
    .machine-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: #fff; }
    
    .htb-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 2.5rem; margin-bottom: 2rem; }
    .htb-card-title { font-size: 1rem; color: var(--neon-cyan); font-weight: bold; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #23282f; padding-bottom: 0.75rem; }
    
    .htb-input { 
      background: #0b0e11; 
      border: 1px solid #23282f; 
      color: #fff; 
      font-size: 1rem; 
      padding: 1rem; 
      width: 100%; 
      border-radius: 4px; 
      font-family: 'Share Tech Mono', monospace; 
      margin-top: 0.5rem;
    }
    .htb-input:focus { border-color: var(--neon-green); outline: none; }
    .htb-btn { 
      background: var(--neon-cyan); 
      color: #000; 
      font-weight: bold; 
      padding: 1rem; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      width: 100%;
    }

    .htb-terminal { background: #050505; border: 1px solid #1c2126; border-radius: 4px; font-family: 'Share Tech Mono', monospace; margin-bottom: 2rem; overflow: hidden; }
    .htb-terminal-header { background: #15191d; padding: 6px 12px; color: #626e84; font-size: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #1c2126; }
    .htb-terminal-body { padding: 1rem; color: var(--neon-yellow); font-size: 12px; line-height: 1.5; height: 150px; overflow-y: auto; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/act.png" alt="Logo" style="height: 32px; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser"><span class="nav-user-badge">Connecting...</span></div>
  </nav>

  <main class="main-content">
    <div class="htb-container">
      <header class="machine-header">
        <h1 class="machine-title">CROSS-SITE REQUEST FORGERY</h1>
        <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">PHASE: STATE-CHANGING ACTION MANIPULATION</p>
      </header>

      <div class="htb-terminal">
        <div class="htb-terminal-header"><span>HTTP TRAFFIC MONITORING</span></div>
        <div class="htb-terminal-body" id="trafficLog"><div>Listening for cross-origin POST requests...</div></div>
      </div>

      <!-- SUBMIT FLAG SECTION (MOVED UP) -->
      <section class="htb-card" style="border: 1px solid var(--neon-green); background: rgba(159,239,0,0.02); margin-bottom: 3rem;">
        <h2 class="htb-card-title" style="margin-bottom: 1.2rem; font-size: 0.9rem;">Submit Flag Found</h2>
        <div style="display: flex; gap: 1rem;">
          <input type="text" id="flagInput" class="htb-input" placeholder="ACT{flag_here}" style="flex: 1; height: 45px; margin-top: 0;">
          <button onclick="submitFlag(5)" class="htb-btn" style="width: auto; padding: 0 1.5rem; height: 45px; font-size: 12px; margin-top: 0;">Submit Flag</button>
        </div>
      </section>

      <section class="htb-card">
        <h2 class="htb-card-title">Target: Account Management</h2>
        <div id="profileView" style="margin-bottom: 2rem; background: #0b0e11; padding: 1.5rem; border-radius: 4px; border-left: 3px solid var(--neon-green);"><div class="spinner"></div></div>
        <form onsubmit="updateProfile(event)">
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label class="form-label">New Email Address</label>
            <input type="email" id="emailInput" class="htb-input" placeholder="attacker@mail.com" required>
          </div>
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label class="form-label">New Biography</label>
            <textarea id="bioInput" class="htb-input" rows="3" placeholder="Injected content..."></textarea>
          </div>
          <button type="submit" class="htb-btn">Update Profile</button>
        </form>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function submitFlag(id) {
      const flag = document.getElementById('flagInput').value;
      if (!flag) return showToast('Please enter a flag', 'error');
      try {
        const res = await fetch('/api/challenges/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ challengeId: id, flag: flag }) });
        const data = await res.json();
        if (data.correct) {
          showToast('Correct flag!', 'success');
          // REMOVED AUTO-REDIRECT
        } else { showToast(data.message || 'Incorrect flag', 'error'); }
      } catch (err) {}
    }
    async function updateProfile(e) {
      if (e) e.preventDefault();
      const email = document.getElementById('emailInput').value;
      const bio = document.getElementById('bioInput').value;
      try {
        const res = await fetch('/api/profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, bio }) });
        const data = await res.json();
        if (data.success) {
          showToast('Updated!', 'success');
          loadProfile();
        }
      } catch (err) {}
    }

    function showToast(msg, type) { 
      const container = document.getElementById('toastContainer'); 
      container.innerHTML = ''; 
      const toast = document.createElement('div'); toast.className = `toast toast-${type}`; toast.textContent = msg; container.appendChild(toast); setTimeout(() => toast.remove(), 3000); 
    }

    async function loadProfile() {
      try {
        const res = await fetch('/api/profile/me');
        const data = await res.json();
        if (data.success) {
          const u = data.user;
          if (!initialEmail) {
            initialEmail = u.email;
            document.getElementById('emailInput').value = u.email || '';
            document.getElementById('bioInput').value = u.bio || '';
          }
          
          document.getElementById('profileView').innerHTML = `
            <div style="display: flex; align-items: center; gap: 1rem;">
              <div class="profile-avatar" style="width:50px; height:50px; margin:0; font-size:1.2rem; background: var(--neon-cyan); color: #000;">${u.username[0].toUpperCase()}</div>
              <div>
                <div style="font-weight: bold; color: #fff; font-size:1.1rem;">${u.username}</div>
                <div style="font-size: 11px; color: var(--neon-cyan); font-family: 'Share Tech Mono';">${u.email || 'NO_EMAIL'}</div>
              </div>
            </div>`;

          // If email changed, trigger Flag
          if (u.email !== initialEmail) {
            showCsrfFlag();
          }
        }
      } catch (err) {}
    }

    async function pollTraffic() {
      try {
        const res = await fetch('/api/admin/activities'); 
        const data = await res.json();
        if (data.success) {
          const logs = data.activities.filter(l => l.action === 'UPDATE_PROFILE').slice(0, 5);
          const logBody = document.getElementById('trafficLog');
          logBody.innerHTML = logs.map(l => {
            const isExternal = !l.details.includes('Internal') && !l.details.includes('localhost');
            return `<div style="margin-bottom: 5px; color: ${isExternal ? 'var(--neon-pink)' : 'var(--neon-yellow)'};">
              [${new Date(l.created_at).toLocaleTimeString()}] UPDATE_REQ &rarr; ${l.details}
              ${isExternal ? ' <span style="font-weight:bold;">[ATTACK_DETECTED]</span>' : ''}
            </div>`;
          }).join('');
          
          if (logs.some(l => !l.details.includes('Internal') && !l.details.includes('localhost'))) {
            loadProfile(); // Refresh profile to trigger flag if needed
          }
        }
      } catch (err) {}
    }

    function showCsrfFlag() {
      if (document.getElementById('csrfFlag')) return;
      const container = document.querySelector('.main-content .htb-container');
      const div = document.createElement('div');
      div.id = 'csrfFlag';
      div.innerHTML = `
        <div style="border: 2px solid var(--neon-pink); background: rgba(255,0,102,0.1); padding: 2.5rem; border-radius: 4px; text-align: center; margin-bottom: 2rem; animation: pulse 2s infinite; border-style: dashed;">
          <div style="color: var(--neon-pink); font-weight: bold; margin-bottom: 1rem; font-size: 14px; letter-spacing: 4px;">[ ⚠️ SECURITY_BREACH: ACCOUNT_HIJACKED ]</div>
          <div style="font-family: 'Share Tech Mono'; color: #fff; font-size: 1.4rem; font-weight: bold; margin-bottom: 1.5rem;">Unauthorized Cross-Origin Request Executed!</div>
          <div style="display:inline-block; background: #000; padding: 1rem 2rem; border: 1px solid var(--neon-yellow);">
            <div style="font-family: 'Share Tech Mono'; color: var(--neon-yellow); font-size: 2rem; font-weight: bold;">ACT{cr5f_byp4ss_r3f3r3r}</div>
          </div>
        </div>
      `;
      container.prepend(div);
      showToast('CSRF ATTACK DETECTED!', 'error');
    }

    setInterval(pollTraffic, 2000);
    setInterval(loadProfile, 5000);

    async function initStatus() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        const u = data.user || { username: 'Guest', score: 0, role: 'user' };
        const isAdmin = u.role === 'admin' || document.cookie.includes('role=admin');
        let navHtml = `<span class="nav-user-badge">Status: ${u.username} (${u.score} PTS)</span>`;
        if (isAdmin) { navHtml = `<a href="/admin" class="nav-user-badge" style="border-color:var(--neon-pink); color:var(--neon-pink); text-decoration:none; animation: pulse 1s infinite;">⚠️ ADMIN_ACCESS_GRANTED</a> ` + navHtml; }
        document.getElementById('navUser').innerHTML = navHtml;
        if (typeof loadProfile === 'function') loadProfile();
        if (typeof pollTraffic === 'function') pollTraffic();
      } catch (err) {}
    }
    initStatus();
  </script>
</body>
</html>
