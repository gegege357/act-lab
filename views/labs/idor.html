<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDOR Lab - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="container" style="max-width: 800px;">
      <!-- HEADER -->
      <header style="text-align: center; margin-bottom: 3rem;">
        <div class="badge badge-idor">MISSION: BROKEN OBJECT ACCESS</div>
        <h1 class="hero-title" style="font-size: 3rem; margin-top: 1rem;">IDOR ENUMERATION</h1>
        <p class="text-secondary">Manipulate object identifiers to access unauthorized data.</p>
      </header>

      <!-- API RECON -->
      <section class="terminal" style="margin-bottom: 2rem;">
        <div class="terminal-header">
          <div class="terminal-dot yellow"></div>
          <div class="terminal-title">API ENDPOINT RECONNAISSANCE</div>
        </div>
        <div class="terminal-body" style="color: var(--text-secondary); font-size: 13px;">
          REQUEST: <code style="color: var(--neon-cyan);">GET /api/profile?id=</code><span id="urlParamPreview" style="color:var(--neon-yellow); font-weight:bold;">1</span>
        </div>
      </section>

      <!-- EXPLOIT CARD -->
      <section class="card">
        <div class="card-header">
          <h2 class="card-title">User Data Retrieval</h2>
        </div>
        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
          <input type="number" id="userIdInput" class="form-input" value="1" min="1" oninput="updatePreview()" style="width: 100px; text-align: center;">
          <button onclick="fetchProfile()" class="btn btn-primary btn-block">FETCH PROFILE</button>
        </div>
        
        <!-- PROFILE RESULT -->
        <div id="profileDisplay" style="min-height: 150px; border: 1px solid var(--border-color); border-radius: 8px; padding: 1.5rem; background: rgba(0,0,0,0.2);">
          <div style="text-align: center; color: var(--text-dim); margin-top: 2rem;">[ NO DATA RETRIEVED ]</div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function updatePreview() {
      document.getElementById('urlParamPreview').textContent = document.getElementById('userIdInput').value;
    }

    async function fetchProfile() {
      const id = document.getElementById('userIdInput').value;
      const display = document.getElementById('profileDisplay');
      display.innerHTML = '<div class="spinner" style="margin: 2rem auto;"></div>';

      try {
        const res = await fetch(`/api/profile?id=${id}`);
        const data = await res.json();
        if (data.success) {
          const u = data.user;
          const isAlice = u.username.toLowerCase() === 'alice';
          
          display.innerHTML = `
            <div style="display: flex; flex-direction: column; gap: 1rem;">
              <div style="display: flex; align-items: center; gap: 1rem;">
                <div class="nav-logo-icon" style="width: 40px; height: 40px; font-size: 18px;">${u.username[0].toUpperCase()}</div>
                <div>
                  <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase;">Username</div>
                  <div style="font-weight: bold; color: white;">${u.username}</div>
                </div>
              </div>
              <div>
                <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase;">Bio / Secret Data</div>
                <div style="color: var(--text-secondary); font-style: italic; font-size: 14px; margin-top: 5px;">"${u.bio || 'None'}"</div>
              </div>
              ${isAlice ? `
                <div style="background:rgba(0,255,136,0.1); border:1px solid var(--neon-green); padding: 1rem; border-radius: 8px; text-align: center; margin-top: 1rem;">
                  <div style="color: var(--neon-green); font-weight: bold; font-size: 11px;">FLAG CAPTURED</div>
                  <div style="font-family: 'Share Tech Mono'; color: var(--neon-yellow); font-size: 1.2rem;">ACT{1d0r_us3r_3num}</div>
                </div>
              ` : ''}
            </div>
          `;
          if (isAlice) showToast('Flag Found!', 'success');
        } else {
          display.innerHTML = '<div style="text-align: center; color: var(--neon-pink); font-size: 12px; margin-top: 2rem;">[!] USER NOT FOUND</div>';
        }
      } catch (err) { showToast('API Error', 'error'); }
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
          fetchProfile();
        }
      } catch (err) {}
    }
    initAuth();
    updatePreview();
  </script>
</body>
</html>
