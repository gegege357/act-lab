<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDOR Lab - ACT LAB (HTB Edition)</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; }
    .htb-container { max-width: 800px; margin: 4rem auto; }
    .machine-header { border-left: 4px solid var(--neon-green); padding-left: 1.5rem; margin-bottom: 3rem; }
    .machine-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: #fff; }
    
    .htb-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 2.5rem; margin-bottom: 2rem; }
    .htb-card-title { font-size: 1rem; color: var(--neon-green); font-weight: bold; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #23282f; padding-bottom: 0.75rem; }
    
    .htb-input { 
      background: #0b0e11; 
      border: 1px solid #23282f; 
      color: var(--neon-green); 
      font-size: 1.5rem; 
      padding: 0.8rem; 
      width: 120px; 
      border-radius: 4px; 
      font-family: 'Share Tech Mono', monospace; 
      text-align: center;
    }
    .htb-input:focus { border-color: var(--neon-green); outline: none; }
    .htb-btn { 
      background: var(--neon-green); 
      color: #000; 
      font-weight: bold; 
      padding: 1rem 2rem; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      flex: 1;
    }

    .htb-terminal { background: #050505; border: 1px solid #1c2126; border-radius: 4px; font-family: 'Share Tech Mono', monospace; margin-bottom: 2rem; overflow: hidden; }
    .htb-terminal-header { background: #15191d; padding: 6px 12px; color: #626e84; font-size: 10px; display: flex; justify-content: space-between; }
    .htb-terminal-body { padding: 1rem; color: var(--neon-cyan); font-size: 14px; line-height: 1.5; text-align: center; }

    .profile-display { min-height: 250px; background: #0b0e11; border: 1px solid #23282f; border-radius: 4px; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="cyber-bg" style="opacity: 0.05;"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/act.png" alt="Logo" style="height: 32px; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="htb-container">
      <!-- HEADER -->
      <header class="machine-header">
        <h1 class="machine-title">INSECURE DIRECT OBJECT REFERENCE</h1>
        <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">PHASE: IDENTIFIER ENUMERATION & PRIVILEGE ESCALATION</p>
      </header>

      <!-- RECON -->
      <div class="htb-terminal">
        <div class="htb-terminal-header">
          <span>API RECONNAISSANCE</span>
          <span>METHOD: GET</span>
        </div>
        <div class="htb-terminal-body">
          <span style="color: #626e84;">TARGET_URL: </span><code style="color: #fff;">/api/profile?id=</code><span id="urlParamPreview" style="color:var(--neon-yellow); font-weight:bold;">1</span>
        </div>
      </div>

      <!-- EXPLOIT -->
      <section class="htb-card">
        <h2 class="htb-card-title">Manipulate Reference</h2>
        <div style="display: flex; gap: 1rem;">
          <input type="number" id="userIdInput" class="htb-input" value="1" min="1" oninput="updatePreview()">
          <button onclick="fetchProfile()" class="htb-btn">Enumerate Profile</button>
        </div>
      </section>

      <!-- DISPLAY -->
      <div class="htb-card">
        <h2 class="htb-card-title">Retrieved Data Response</h2>
        <div id="profileDisplay" class="profile-display">
          <div style="color: #626e84; font-size: 13px;">[ AWAITING_REQUEST ]</div>
        </div>
      </div>

      <!-- SUBMIT FLAG SECTION -->
      <section class="htb-card" style="margin-top: 4rem; border-color: var(--neon-green);">
        <h2 class="htb-card-title" style="color: #fff;">Submit Flag</h2>
        <div style="display: flex; gap: 1rem;">
          <input type="text" id="flagInput" class="htb-input" placeholder="ACT{flag_here}" style="flex: 1; margin-top: 0; width: 100%;">
          <button onclick="submitFlag(7)" class="htb-btn" style="width: auto; padding: 0 2rem; margin-top: 0; flex: 0;">Submit</button>
        </div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function submitFlag(id) {
      const flag = document.getElementById('flagInput').value;
      if (!flag) return showToast('Please enter a flag', 'error');
      try {
        const res = await fetch('/api/challenges/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ challengeId: id, flag: flag })
        });
        const data = await res.json();
        if (data.correct) {
          showToast('Correct flag!', 'success');
          setTimeout(() => window.location.href = '/dashboard', 2000);
        } else { showToast(data.message || 'Incorrect flag', 'error'); }
      } catch (err) {}
    }

    function updatePreview() {
      document.getElementById('urlParamPreview').textContent = document.getElementById('userIdInput').value;
    }

    async function fetchProfile() {
      const id = document.getElementById('userIdInput').value;
      const display = document.getElementById('profileDisplay');
      display.innerHTML = '<div class="spinner"></div>';
      try {
        const res = await fetch(`/api/profile?id=${id}`);
        const data = await res.json();
        if (data.success) {
          const u = data.user;
          const isAlice = u.username.toLowerCase() === 'alice';
          display.innerHTML = `
            <div style="text-align: center; width: 100%;">
              <div class="nav-logo-icon" style="width: 60px; height: 60px; font-size: 24px; margin: 0 auto 1.5rem auto;">${u.username[0].toUpperCase()}</div>
              <div style="color: var(--neon-green); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem;">User Found: #${u.id}</div>
              <div style="color: #fff; font-size: 1.8rem; font-weight: bold; margin-bottom: 1rem;">${u.username}</div>
              <div style="color: var(--text-secondary); font-style: italic; max-width: 400px; margin: 0 auto;">"${u.bio || 'No public information available.'}"</div>
              ${isAlice ? `<div style="border: 1px solid var(--neon-green); background: rgba(159,239,0,0.05); padding: 1.5rem; border-radius: 4px; margin-top: 2rem;"><div style="color: var(--neon-green); font-weight: bold; font-size: 11px; letter-spacing: 2px;">[ PRIVATE DATA ACCESSED ]</div><div style="font-family: 'Share Tech Mono'; color: var(--neon-yellow); font-size: 1.3rem;">ACT{1d0r_us3r_3num}</div></div>` : ''}
            </div>`;
        } else { display.innerHTML = '<div style="color: var(--neon-pink); font-weight: bold; font-size: 12px;">[!] 404: NOT FOUND</div>'; }
      } catch (err) {}
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div'); toast.className = `toast toast-${type}`; toast.textContent = msg; container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username} (Score: ${data.user.score || 0})</span>`;
        }
      } catch (err) {}
    }
    initAuth();
    updatePreview();
  </script>
</body>
</html>
