<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDOR Lab - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .exploit-container { max-width: 900px; margin: 0 auto; padding: 2rem 0; }
    .giant-input { 
      background: rgba(0,0,0,0.4); 
      border: 2px solid var(--neon-green); 
      color: var(--neon-green); 
      font-size: 2.5rem; 
      padding: 1.5rem; 
      border-radius: 15px; 
      font-family: 'Share Tech Mono', monospace;
      outline: none;
      text-align: center;
      width: 150px;
    }
    .api-preview { background: #05050d; padding: 1.5rem; border-radius: 8px; border-left: 4px solid var(--neon-green); margin-bottom: 3rem; font-family: 'Share Tech Mono'; font-size: 1.2rem; color: #555; text-align: center; }
    .btn-giant { flex-grow: 1; padding: 1.5rem; font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; background: var(--neon-green); color: black; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; }
    .profile-stage { min-height: 250px; background: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.1); border-radius: 12px; margin-top: 3rem; padding: 3rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="exploit-container">
      <div class="page-header" style="text-align:center; margin-bottom: 4rem;">
        <h1 style="color: var(--neon-green); font-size: 3rem; text-shadow: 0 0 20px rgba(0, 255, 0, 0.4);">IDOR ENUMERATION</h1>
        <p class="text-mono" style="font-size: 1.2rem; color: #888;">ACCESS UNAUTHORIZED OBJECT REFERENCES</p>
      </div>

      <!-- API RECON -->
      <div class="api-preview">
        <span style="color: #444;">API ENDPOINT:</span><br>
        <code>GET /api/profile?id=<span id="urlParamPreview" style="color:var(--neon-yellow); font-weight:bold;">1</span></code>
      </div>

      <!-- MAIN EXPLOIT -->
      <div class="card" style="padding: 3rem; border-color: rgba(0, 255, 0, 0.2); border-width: 2px;">
        <div class="text-xs uppercase text-dim mb-6 tracking-widest text-center">Manipulate Object ID</div>
        
        <div class="flex items-center gap-4">
          <input type="number" id="userIdInput" class="giant-input" value="1" min="1" oninput="updatePreview()">
          <button onclick="fetchProfile()" class="btn-giant">FETCH PRIVATE DATA</button>
        </div>
      </div>

      <!-- PROFILE STAGE -->
      <div id="profileDisplay" class="profile-stage">
        <div class="text-xs text-dim uppercase">Awaiting Reference Execution...</div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function updatePreview() {
      document.getElementById('urlParamPreview').textContent = document.getElementById('userIdInput').value;
    }

    async function fetchProfile() {
      const id = document.getElementById('userIdInput').value;
      const display = document.getElementById('profileDisplay');
      display.innerHTML = '<div class="spinner"></div>';

      try {
        const res = await fetch(`/api/profile?id=${id}`);
        const data = await res.json();
        if (data.success) {
          const u = data.user;
          const isAlice = u.username.toLowerCase() === 'alice';
          
          display.innerHTML = `
            <div class="flex flex-column items-center text-center">
              <div class="avatar-placeholder" style="width: 80px; height: 80px; font-size: 32px; background:var(--neon-green); color:black; margin-bottom: 1.5rem;">${u.username[0].toUpperCase()}</div>
              <div class="text-dim text-xs uppercase tracking-widest mb-1">User Identifier: ${u.id}</div>
              <div class="white font-bold text-2xl mb-4">${u.username}</div>
              <div class="text-sm text-secondary italic max-width-500">"${u.bio || 'No public information available.'}"</div>
              
              ${isAlice ? `
                <div style="background:rgba(0,255,136,0.1); border:2px solid var(--neon-green); color:var(--neon-green); padding:2rem; border-radius:12px; margin-top: 2rem; animation: pulse 1.5s infinite; width: 100%;">
                  <h2 style="margin-bottom: 1rem; letter-spacing: 5px;">SENSITIVE DATA EXPOSED</h2>
                  <div style="background: black; padding: 1rem; border-radius: 8px; display: inline-block; min-width: 250px;">
                    <span style="color: #666; font-size: 0.8rem;">FLAG CAPTURED:</span><br>
                    <span style="color: var(--neon-yellow); font-size: 1.5rem; font-weight: bold; font-family: 'Share Tech Mono';">ACT{1d0r_us3r_3num}</span>
                  </div>
                </div>
              ` : ''}
            </div>
          `;
          if (isAlice) showToast('Unauthorized Access Successful!', 'success');
        } else {
          display.innerHTML = '<div class="text-pink text-xs uppercase font-bold">[!] OBJECT NOT FOUND</div>';
        }
      } catch (err) {
        showToast('API connection failure', 'error');
      }
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        let res = await fetch('/api/auth/status');
        let data = await res.json();
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
          fetchProfile();
        }
      } catch (err) {}
    }
    initAuth();
    updatePreview();
  </script>
</body>
</html>
