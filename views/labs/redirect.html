<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirect Lab - ACT LAB (HTB Edition)</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; }
    .htb-container { max-width: 800px; margin: 4rem auto; }
    .machine-header { border-left: 4px solid var(--neon-green); padding-left: 1.5rem; margin-bottom: 3rem; }
    .machine-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: #fff; }
    
    .htb-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 2.5rem; margin-bottom: 2rem; }
    .htb-card-title { font-size: 1rem; color: var(--neon-green); font-weight: bold; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #23282f; padding-bottom: 0.75rem; }
    
    .htb-input { 
      background: #0b0e11; 
      border: 1px solid #23282f; 
      color: #fff; 
      font-size: 1rem; 
      padding: 1rem; 
      width: 100%; 
      border-radius: 4px; 
      font-family: 'Share Tech Mono', monospace; 
    }
    .htb-input:focus { border-color: var(--neon-green); outline: none; }
    .htb-btn { 
      background: var(--neon-green); 
      color: #000; 
      font-weight: bold; 
      padding: 1rem; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      width: 100%;
    }

    .htb-terminal { background: #050505; border: 1px solid #1c2126; border-radius: 4px; font-family: 'Share Tech Mono', monospace; margin-bottom: 2rem; overflow: hidden; }
    .htb-terminal-header { background: #15191d; padding: 6px 12px; color: #626e84; font-size: 10px; display: flex; justify-content: space-between; }
    .htb-terminal-body { padding: 1.2rem; color: var(--neon-yellow); font-size: 13px; line-height: 1.5; text-align: center; }

    .flow-viz { display: flex; align-items: center; justify-content: center; gap: 2rem; padding: 2rem; background: #0b0e11; border-radius: 4px; border: 1px solid #23282f; margin-top: 2rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/act.png" alt="Logo" style="height: 32px; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser"><span class="nav-user-badge">Connecting...</span></div>
  </nav>

  <main class="main-content">
    <div class="htb-container">
      <header class="machine-header">
        <h1 class="machine-title">OPEN REDIRECT :: NAVIGATION ABUSE</h1>
        <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">PHASE: TRUST BOUNDARY VIOLATION & PHISHING GATEWAY</p>
      </header>

      <div class="htb-terminal">
        <div class="htb-terminal-header"><span>HTTP REDIRECT ANALYSIS</span></div>
        <div class="htb-terminal-body">
          <span style="color: #626e84;">ENDPOINT: </span><code style="color: #fff;">GET /api/redirect?url=</code><span id="urlPreview" style="color:var(--neon-yellow);">https://google.com</span>
        </div>
      </div>

      <!-- SUBMIT FLAG SECTION (MOVED UP) -->
      <section class="htb-card" style="border: 1px solid var(--neon-green); background: rgba(159,239,0,0.02); margin-bottom: 3rem;">
        <h2 class="htb-card-title" style="margin-bottom: 1.2rem; font-size: 0.9rem;">Submit Flag Found</h2>
        <div style="display: flex; gap: 1rem;">
          <input type="text" id="flagInput" class="htb-input" placeholder="ACT{flag_here}" style="flex: 1; height: 45px; margin-top: 0;">
          <button onclick="submitFlag(6)" class="htb-btn" style="width: auto; padding: 0 1.5rem; height: 45px; font-size: 12px; margin-top: 0;">Submit Flag</button>
        </div>
      </section>

      <section class="htb-card">
        <h2 class="htb-card-title">Craft Target Destination</h2>
        <form onsubmit="testRedirect(event)">
          <div class="form-group"><input type="text" id="targetUrl" class="htb-input" value="https://google.com" oninput="updatePreview()" autocomplete="off"></div>
          <button type="submit" class="htb-btn" style="margin-top: 1.5rem;">Execute Redirection</button>
        </form>
        <div class="flow-viz"><div style="font-size: 13px; font-weight: bold; color: var(--neon-cyan);">ACT-LAB.ID</div><div style="font-size: 20px; color: var(--neon-pink);">➔</div><div id="destDisplay" style="font-size: 13px; font-weight: bold; color: var(--neon-yellow);">GOOGLE.COM</div></div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function submitFlag(id) {
      const flag = document.getElementById('flagInput').value;
      if (!flag) return showToast('Please enter a flag', 'error');
      try {
        const res = await fetch('/api/challenges/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ challengeId: id, flag: flag }) });
        const data = await res.json();
        if (data.correct) { showToast('Correct!', 'success'); setTimeout(() => window.location.href = '/dashboard', 1500); } else { showToast(data.message || 'Incorrect', 'error'); }
      } catch (err) {}
    }
    function updatePreview() { const url = document.getElementById('targetUrl').value; document.getElementById('urlPreview').textContent = url; try { const domain = url.startsWith('http') ? new URL(url).hostname : url; document.getElementById('destDisplay').textContent = domain.toUpperCase() || 'INVALID'; } catch (e) { document.getElementById('destDisplay').textContent = 'INVALID'; } }
    function testRedirect(e) { if (e) e.preventDefault(); const url = document.getElementById('targetUrl').value; setTimeout(() => { window.location.href = `/api/redirect?url=${encodeURIComponent(url)}`; }, 800); }
    function showToast(msg, type) { const container = document.getElementById('toastContainer'); const toast = document.createElement('div'); toast.className = `toast toast-${type}`; toast.textContent = msg; container.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
    async function initStatus() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.success && !data.user.username.startsWith('guest_')) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge" style="border-color:var(--neon-cyan); color:var(--neon-cyan);">Operator: ${data.user.username} (Score: ${data.user.score})</span>`;
        } else {
          const u = data.user || { username: 'Guest', score: 0 };
          document.getElementById('navUser').innerHTML = `
            <span class="nav-user-badge" style="margin-right:10px;">Guest (Score: ${u.score})</span>
            <a href="/login" class="nav-user-badge" style="text-decoration:none; border-color:var(--neon-green); color:var(--neon-green);">Sign In</a>
          `;
        }
        if (typeof updatePreview === 'function') updatePreview();
      } catch (err) {}
    }
    initStatus();
  </script>
</body>
</html>
