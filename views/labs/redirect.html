<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirect Lab - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="container" style="max-width: 800px;">
      <!-- HEADER -->
      <header style="text-align: center; margin-bottom: 3rem;">
        <div class="badge badge-redirect">MISSION: OPEN NAVIGATION</div>
        <h1 class="hero-title" style="font-size: 3rem; margin-top: 1rem;">OPEN REDIRECT</h1>
        <p class="text-secondary">Abuse unvalidated redirection parameters to mask malicious destinations.</p>
      </header>

      <!-- RECON BOX -->
      <section class="terminal" style="margin-bottom: 2rem;">
        <div class="terminal-header">
          <div class="terminal-dot cyan"></div>
          <div class="terminal-title">HTTP REDIRECT RECONNAISSANCE</div>
        </div>
        <div class="terminal-body" style="color: var(--text-secondary); font-size: 13px;">
          ENDPOINT: <code style="color: var(--neon-pink);">GET /api/redirect?url=</code><span id="urlPreview" style="color:var(--neon-yellow);">https://google.com</span>
        </div>
      </section>

      <!-- EXPLOIT CARD -->
      <section class="card">
        <form onsubmit="testRedirect(event)">
          <div class="form-group">
            <label class="form-label">Destination URL</label>
            <input type="text" id="targetUrl" class="form-input" value="https://google.com" oninput="updatePreview()" autocomplete="off">
          </div>
          <button type="submit" class="btn btn-primary btn-block">EXECUTE REDIRECTION</button>
        </form>
        
        <div style="display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-top: 2rem; padding: 2rem; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
          <div style="font-size: 14px; font-weight: bold; color: var(--neon-cyan);">ACT-LAB.ID</div>
          <div style="font-size: 20px; color: var(--neon-pink);">➔</div>
          <div id="destDisplay" style="font-size: 14px; font-weight: bold; color: var(--neon-yellow);">GOOGLE.COM</div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function updatePreview() {
      const url = document.getElementById('targetUrl').value;
      document.getElementById('urlPreview').textContent = url;
      try {
        const domain = url.startsWith('http') ? new URL(url).hostname : url;
        document.getElementById('destDisplay').textContent = domain.toUpperCase() || 'INVALID';
      } catch (e) { document.getElementById('destDisplay').textContent = 'INVALID'; }
    }

    function testRedirect(e) {
      if (e) e.preventDefault();
      const url = document.getElementById('targetUrl').value;
      showToast('Redirecting...', 'warning');
      setTimeout(() => {
        window.location.href = `/api/redirect?url=${encodeURIComponent(url)}`;
      }, 800);
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
          updatePreview();
        }
      } catch (err) {}
    }
    initAuth();
  </script>
</body>
</html>
