<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirect Lab - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .exploit-container { max-width: 900px; margin: 0 auto; padding: 2rem 0; }
    .giant-input { 
      width: 100%; 
      background: rgba(0,0,0,0.4); 
      border: 2px solid var(--neon-pink); 
      color: var(--neon-pink); 
      font-size: 1.5rem; 
      padding: 1.2rem; 
      border-radius: 12px; 
      font-family: 'Share Tech Mono', monospace;
      outline: none;
    }
    .recon-box { background: #05050d; padding: 1.5rem; border-radius: 8px; border-left: 4px solid var(--neon-pink); margin-bottom: 2rem; font-family: 'Share Tech Mono'; font-size: 1.1rem; color: #555; text-align: center; }
    .btn-giant { width: 100%; padding: 1.5rem; font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; background: var(--neon-pink); color: black; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
    .flow-viz { display: flex; align-items: center; justify-content: center; gap: 30px; padding: 3rem; background: rgba(255,255,255,0.02); border-radius: 15px; margin-top: 3rem; border: 1px solid rgba(255,255,255,0.05); }
    .node { padding: 20px 30px; border-radius: 8px; border: 2px solid; font-size: 1.2rem; font-weight: bold; }
    .arrow { font-size: 2rem; color: var(--neon-pink); animation: slideRight 1s infinite; }
    @keyframes slideRight { 0% { transform: translateX(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateX(20px); opacity: 0; } }
  </style>
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="exploit-container">
      <div class="page-header" style="text-align:center; margin-bottom: 4rem;">
        <h1 style="color: var(--neon-pink); font-size: 3rem; text-shadow: 0 0 20px rgba(255, 0, 85, 0.4);">OPEN REDIRECT</h1>
        <p class="text-mono" style="font-size: 1.2rem; color: #888;">UNVALIDATED NAVIGATION PARAMETER MANIPULATION</p>
      </div>

      <!-- RECON BOX -->
      <div class="recon-box">
        <span style="color: #444;">HTTP REQUEST RECON:</span><br>
        <code>GET /api/redirect?url=<span id="urlPreview" style="color:var(--neon-yellow); font-weight:bold;">https://google.com</span></code>
      </div>

      <!-- MAIN INPUT -->
      <div class="card" style="padding: 3rem; border-color: rgba(255, 0, 85, 0.2); border-width: 2px;">
        <div class="text-xs uppercase text-dim mb-4 tracking-widest text-center">Craft Destination URL</div>
        <form onsubmit="testRedirect(event)" class="flex flex-column gap-5">
          <input type="text" id="targetUrl" class="giant-input" value="https://google.com" oninput="updatePreview()" autocomplete="off">
          <button type="submit" class="btn-giant">EXECUTE REDIRECTION</button>
        </form>
      </div>

      <!-- FLOW VISUALIZATION -->
      <div class="flow-viz">
        <div class="node" style="border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);">ACT-LAB.ID</div>
        <div class="arrow">➔</div>
        <div class="node" id="destDisplay" style="border-color: var(--neon-yellow); color: var(--neon-yellow); box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);">GOOGLE.COM</div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function updatePreview() {
      const url = document.getElementById('targetUrl').value;
      document.getElementById('urlPreview').textContent = url;
      try {
        const domain = url.startsWith('http') ? new URL(url).hostname : url;
        document.getElementById('destDisplay').textContent = domain.toUpperCase() || 'INVALID';
      } catch (e) {
        document.getElementById('destDisplay').textContent = 'INVALID';
      }
    }

    function testRedirect(e) {
      if (e) e.preventDefault();
      const url = document.getElementById('targetUrl').value;
      showToast('Intercepting and redirecting...', 'warning');
      
      setTimeout(() => {
        window.location.href = `/api/redirect?url=${encodeURIComponent(url)}`;
      }, 1000);
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        let res = await fetch('/api/auth/status');
        let data = await res.json();
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
          updatePreview();
        }
      } catch (err) {}
    }
    initAuth();
  </script>
</body>
</html>
