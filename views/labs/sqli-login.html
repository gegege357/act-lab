<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQLi Login - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .exploit-container { max-width: 900px; margin: 0 auto; padding: 2rem 0; }
    .giant-input { 
      width: 100%; 
      background: rgba(0,0,0,0.4); 
      border: 2px solid var(--neon-pink); 
      color: var(--neon-pink); 
      font-size: 1.5rem; 
      padding: 1.2rem; 
      border-radius: 12px; 
      font-family: 'Share Tech Mono', monospace;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(255, 0, 85, 0.1);
    }
    .giant-input:focus { box-shadow: 0 0 25px rgba(255, 0, 85, 0.3); background: rgba(255, 0, 85, 0.05); }
    .label-text { color: var(--neon-pink); font-size: 0.9rem; margin-bottom: 0.8rem; display: block; letter-spacing: 2px; font-weight: bold; }
    .query-preview { background: #05050d; padding: 1.5rem; border-radius: 8px; border-left: 4px solid var(--neon-pink); margin-bottom: 2rem; font-family: 'Share Tech Mono'; font-size: 1.1rem; color: #666; }
    .btn-giant { width: 100%; padding: 1.5rem; font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; background: var(--neon-pink); color: black; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
    .btn-giant:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255, 0, 85, 0.4); }
    .terminal-output { background: #000; border: 1px solid #222; border-radius: 12px; padding: 1.5rem; margin-top: 3rem; min-height: 150px; font-family: 'Share Tech Mono'; color: #ff0055; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="exploit-container">
      <div class="page-header" style="text-align:center; margin-bottom: 4rem;">
        <h1 style="color: var(--neon-pink); font-size: 3rem; text-shadow: 0 0 20px rgba(255, 0, 85, 0.5);">SQLi AUTH BYPASS</h1>
        <p class="text-mono" style="font-size: 1.2rem; color: #888;">BREAK THE AUTHENTICATED BARRIER</p>
      </div>

      <!-- SQL VISUALIZER -->
      <div class="query-preview">
        <span style="color: #444;">DATABASE QUERY:</span><br>
        <code style="word-break: break-all;">SELECT * FROM users WHERE username = '<span id="userPreview" style="color:var(--neon-pink);">admin</span>' AND password = '<span id="passPreview" style="color:var(--neon-pink);"></span>'</code>
      </div>

      <!-- MAIN EXPLOIT AREA -->
      <div class="card" style="padding: 3rem; border-width: 2px; border-color: rgba(255, 0, 85, 0.2);">
        <form onsubmit="handleLogin(event)" class="flex flex-column gap-5">
          <div class="form-group">
            <label class="label-text">TARGET USERNAME</label>
            <input type="text" id="usernameInput" class="giant-input" placeholder="admin" oninput="updatePreview()" autocomplete="off">
          </div>
          
          <div class="form-group">
            <label class="label-text">INJECT PASSWORD PAYLOAD</label>
            <input type="text" id="passwordInput" class="giant-input" placeholder="' OR '1'='1" oninput="updatePreview()" autocomplete="off">
          </div>

          <button type="submit" id="loginBtn" class="btn-giant">
            EXECUTE INJECTION
          </button>
        </form>

        <div id="loginResult" class="mt-5"></div>
      </div>

      <!-- SYSTEM LOGS -->
      <div class="terminal-output" id="trafficLog">
        <div style="color: #444; margin-bottom: 10px;">[ SYSTEM LOG MONITOR ]</div>
        <div id="logContent">Waiting for payload execution...</div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function updatePreview() {
      document.getElementById('userPreview').textContent = document.getElementById('usernameInput').value || 'admin';
      document.getElementById('passPreview').textContent = document.getElementById('passwordInput').value;
    }

    async function handleLogin(e) {
      if (e) e.preventDefault();
      const user = document.getElementById('usernameInput').value || 'admin';
      const pass = document.getElementById('passwordInput').value;
      addLog('ATTEMPT', `Payload sent: ${pass}`);

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();

        const resDiv = document.getElementById('loginResult');
        if (data.success) {
          addLog('SUCCESS', `Login Bypass Successful for ${user}!`);
          resDiv.innerHTML = `
            <div style="background:rgba(0,255,136,0.1); border:2px solid var(--neon-green); padding: 2rem; border-radius: 12px; text-align: center; animation: slideUp 0.5s ease;">
              <h2 style="color: var(--neon-green); margin-bottom: 1rem; letter-spacing: 5px;">ACCESS GRANTED</h2>
              <div style="background: black; padding: 1rem; border-radius: 8px;">
                <span style="color: #666; font-size: 0.8rem;">SYSTEM FLAG:</span><br>
                <span style="color: var(--neon-yellow); font-size: 1.5rem; font-weight: bold; font-family: 'Share Tech Mono';">${data.flag || 'ACT{sqli_bypass_master}'}</span>
              </div>
            </div>
          `;
          showToast('SQL Injection Successful!', 'success');
        } else {
          addLog('FAILURE', `Invalid payload: ${data.error}`);
          resDiv.innerHTML = `<div style="text-align: center; color: var(--neon-pink); font-weight: bold; letter-spacing: 2px;">[!] AUTHENTICATION FAILED</div>`;
        }
      } catch (err) {
        addLog('ERROR', 'Backend server unreachable');
      }
    }

    function addLog(type, msg) {
      const log = document.getElementById('logContent');
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.style.marginBottom = '5px';
      div.innerHTML = `<span style="color: #444;">[${time}]</span> <span style="font-weight: bold;">[${type}]</span> ${msg}`;
      log.prepend(div);
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        let res = await fetch('/api/auth/status');
        let data = await res.json();
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
        }
      } catch (err) {}
    }
    initAuth();
    updatePreview();
  </script>
</body>
</html>
