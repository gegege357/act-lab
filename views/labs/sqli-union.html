<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQLi UNION Extraction - ACT LAB (HTB Edition)</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; }
    .htb-container { max-width: 1100px; margin: 4rem auto; }
    .machine-header { border-left: 4px solid var(--neon-cyan); padding-left: 1.5rem; margin-bottom: 3rem; }
    .machine-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: #fff; }
    
    .htb-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 2rem; margin-bottom: 2rem; }
    .htb-card-title { font-size: 1rem; color: var(--neon-cyan); font-weight: bold; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #23282f; padding-bottom: 0.75rem; }
    
    .htb-input { 
      background: #0b0e11; 
      border: 1px solid #23282f; 
      color: #fff; 
      font-size: 1rem; 
      padding: 0.8rem; 
      width: 100%; 
      border-radius: 4px; 
      font-family: 'Share Tech Mono', monospace; 
    }
    .htb-input:focus { border-color: var(--neon-green); outline: none; }
    .htb-btn { 
      background: var(--neon-cyan); 
      color: #000; 
      font-weight: bold; 
      padding: 0.8rem 2rem; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
    }

    .htb-terminal { background: #050505; border: 1px solid #1c2126; border-radius: 4px; font-family: 'Share Tech Mono', monospace; margin-bottom: 2rem; overflow: hidden; }
    .htb-terminal-header { background: #15191d; padding: 6px 12px; color: #626e84; font-size: 10px; display: flex; justify-content: space-between; }
    .htb-terminal-body { padding: 1rem; color: var(--neon-cyan); font-size: 13px; line-height: 1.5; }

    .table-container { overflow-x: auto; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #f0f0f0; }
    th { text-align: left; padding: 12px; background: #0b0e11; border-bottom: 1px solid #23282f; color: var(--neon-cyan); text-transform: uppercase; font-size: 11px; }
    td { padding: 12px; border-bottom: 1px solid #1c2126; }
    tr:hover { background: rgba(159,239,0,0.03); }
    .flag-text { color: var(--neon-yellow); font-weight: bold; }
  </style>
</head>
<body>
  <div class="cyber-bg" style="opacity: 0.05;"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/act.png" alt="Logo" style="height: 32px; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser"><span class="nav-user-badge">Connecting...</span></div>
  </nav>

  <main class="main-content">
    <div class="htb-container">
      <header class="machine-header">
        <h1 class="machine-title">SQL INJECTION :: UNION SELECT</h1>
        <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">PHASE: DATA EXFILTRATION & TABLE LEAKING</p>
      </header>

      <div class="htb-terminal">
        <div class="htb-terminal-header"><span>BACKEND SQL ANALYZER</span></div>
        <div class="htb-terminal-body">
          <span style="color: #626e84;">SELECT id, title, description, category FROM challenges WHERE title LIKE '%</span><span id="sqlPreview" style="color:var(--neon-yellow);"></span><span style="color: #626e84;">%'</span>
        </div>
      </div>

      <!-- SUBMIT FLAG SECTION (MOVED UP) -->
      <section class="htb-card" style="border: 1px solid var(--neon-cyan); background: rgba(0,212,255,0.02); margin-bottom: 3rem;">
        <h2 class="htb-card-title" style="margin-bottom: 1.2rem; font-size: 0.9rem;">Submit Flag Found</h2>
        <div style="display: flex; gap: 1rem;">
          <input type="text" id="flagInput" class="htb-input" placeholder="ACT{flag_here}" style="flex: 1; height: 45px;">
          <button onclick="submitFlag(2)" class="htb-btn" style="width: auto; padding: 0 1.5rem; height: 45px; font-size: 12px;">Submit Flag</button>
        </div>
      </section>

      <section class="htb-card">
        <form onsubmit="handleSearch(event)" style="display: flex; gap: 1rem; align-items: flex-end;">
          <div style="flex: 1;">
            <label class="form-label" style="font-size: 11px; color: #626e84; text-transform: uppercase; margin-bottom: 8px; display: block;">Search / Inject Payload</label>
            <input type="text" id="searchInput" class="htb-input" placeholder="Enter UNION payload..." oninput="updatePreview()" autocomplete="off" required>
          </div>
          <button type="submit" class="htb-btn">Search</button>
        </form>
      </section>

      <div id="resultsArea"></div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function submitFlag(id) {
      const flag = document.getElementById('flagInput').value;
      if (!flag) return showToast('Please enter a flag', 'error');
      try {
        const res = await fetch('/api/challenges/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ challengeId: id, flag: flag }) });
        const data = await res.json();
        if (data.correct) {
          showToast('Correct flag!', 'success');
          // REMOVED AUTO-REDIRECT
        } else { showToast(data.message || 'Incorrect flag', 'error'); }
      } catch (err) {}
    }
    function updatePreview() { document.getElementById('sqlPreview').textContent = document.getElementById('searchInput').value; }
    async function handleSearch(e) {
      if (e) e.preventDefault();
      const q = document.getElementById('searchInput').value;
      const resultsDiv = document.getElementById('resultsArea');
      resultsDiv.innerHTML = '<div class="spinner" style="margin: 4rem auto;"></div>';
      try {
        const res = await fetch(`/api/search?q=${q}`);
        const data = await res.json();
        if (data.success) {
          if (data.results.length === 0) { resultsDiv.innerHTML = `<div class="htb-card" style="text-align:center; color:#626e84; font-size:13px;">[ NO_MATCHES_FOUND ]</div>`; } else {
            const keys = Object.keys(data.results[0]);
            resultsDiv.innerHTML = `<div class="htb-card"><h2 class="htb-card-title">Exfiltrated Data</h2><div class="table-container"><table><thead><tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr></thead><tbody>${data.results.map(row => `<tr>${keys.map(k => { const val = String(row[k] || ''); const isFlag = val.includes('ACT{'); return `<td class="${isFlag ? 'flag-text' : ''}">${escapeHtml(val)}</td>`; }).join('')}</tr>`).join('')}</tbody></table></div></div>`;
          }
        }
      } catch (err) {}
    }
    function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
    function showToast(msg, type) { 
      const container = document.getElementById('toastContainer'); 
      container.innerHTML = ''; // CLEAR PREVIOUS TOASTS
      const toast = document.createElement('div'); toast.className = `toast toast-${type}`; toast.textContent = msg; container.appendChild(toast); setTimeout(() => toast.remove(), 3000); 
    }
    async function initStatus() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        const u = data.user || { username: 'Guest', score: 0, role: 'user' };
        const isAdmin = u.role === 'admin' || document.cookie.includes('role=admin');
        let navHtml = `<span class="nav-user-badge">Status: ${u.username} (${u.score} PTS)</span>`;
        if (isAdmin) { navHtml = `<a href="/admin" class="nav-user-badge" style="border-color:var(--neon-pink); color:var(--neon-pink); text-decoration:none; animation: pulse 1s infinite;">⚠️ ADMIN_ACCESS_GRANTED</a> ` + navHtml; }
        document.getElementById('navUser').innerHTML = navHtml;
      } catch (err) {}
    }
    initStatus();
    updatePreview();
  </script>
</body>
</html>
