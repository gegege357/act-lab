<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQLi UNION Extraction - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .exploit-container { max-width: 1000px; margin: 0 auto; padding: 2rem 0; }
    .giant-input { 
      width: 100%; 
      background: rgba(0,0,0,0.4); 
      border: 2px solid var(--neon-cyan); 
      color: var(--neon-cyan); 
      font-size: 1.5rem; 
      padding: 1.2rem; 
      border-radius: 12px; 
      font-family: 'Share Tech Mono', monospace;
      outline: none;
    }
    .query-preview { background: #05050d; padding: 1.5rem; border-radius: 8px; border-left: 4px solid var(--neon-cyan); margin-bottom: 2rem; font-family: 'Share Tech Mono'; font-size: 1rem; color: #555; overflow-x: auto; }
    .btn-giant { width: 100%; padding: 1.2rem; font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; background: var(--neon-cyan); color: black; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
    .results-table-container { margin-top: 3rem; background: rgba(0,0,0,0.3); border: 1px solid #222; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: rgba(0, 255, 255, 0.1); color: var(--neon-cyan); text-align: left; padding: 15px; border-bottom: 1px solid rgba(0, 255, 255, 0.2); text-transform: uppercase; letter-spacing: 1px; }
    td { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #ccc; }
    .highlight-row { background: rgba(255, 255, 0, 0.05); }
    .flag-cell { color: var(--neon-yellow); font-weight: bold; font-family: 'Share Tech Mono'; }
  </style>
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="exploit-container">
      <div class="page-header" style="text-align:center; margin-bottom: 4rem;">
        <h1 style="color: var(--neon-cyan); font-size: 3rem; text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);">SQLi UNION EXTRACTION</h1>
        <p class="text-mono" style="font-size: 1.2rem; color: #888;">EXFILTRATE SENSITIVE DATA FROM HIDDEN TABLES</p>
      </div>

      <!-- SQL PREVIEW -->
      <div class="query-preview">
        <span style="color: #444;">ACTIVE SQL QUERY:</span><br>
        <code>SELECT id, title, description, category FROM challenges WHERE title LIKE '%<span id="sqlPreview" style="color:var(--neon-yellow); font-weight:bold;"></span>%'</code>
      </div>

      <!-- MAIN SEARCH -->
      <div class="card" style="padding: 2.5rem; border-color: rgba(0, 255, 255, 0.2); border-width: 2px;">
        <div class="text-xs uppercase text-dim mb-4 tracking-widest">Search Database / Inject Payload</div>
        <form onsubmit="handleSearch(event)" class="flex flex-column gap-4">
          <input type="text" id="searchInput" class="giant-input" placeholder="Enter search or UNION payload..." oninput="updatePreview()" autocomplete="off" required>
          <button type="submit" class="btn-giant">EXECUTE UNION ATTACK</button>
        </form>
      </div>

      <!-- RESULTS -->
      <div id="resultsArea"></div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function updatePreview() {
      document.getElementById('sqlPreview').textContent = document.getElementById('searchInput').value;
    }

    async function handleSearch(e) {
      if (e) e.preventDefault();
      const q = document.getElementById('searchInput').value;
      const resultsDiv = document.getElementById('resultsArea');
      resultsDiv.innerHTML = '<div class="spinner" style="margin-top: 4rem;"></div>';

      try {
        const res = await fetch(`/api/search?q=${q}`);
        const data = await res.json();

        if (data.success) {
          if (data.results.length === 0) {
            resultsDiv.innerHTML = `<div class="card text-center text-dim mt-5">NO RECORDS MATCH YOUR QUERY</div>`;
          } else {
            const keys = Object.keys(data.results[0]);
            let html = `
              <div class="results-table-container">
                <table>
                  <thead>
                    <tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr>
                  </thead>
                  <tbody>
                    ${data.results.map(row => {
                      const rowStr = JSON.stringify(row);
                      const isSecret = rowStr.includes('ACT{') || rowStr.toLowerCase().includes('agent');
                      return `
                        <tr class="${isSecret ? 'highlight-row' : ''}">
                          ${keys.map(k => {
                            const val = String(row[k] || '');
                            const isFlag = val.startsWith('ACT{');
                            return `<td class="${isFlag ? 'flag-cell' : ''}">${escapeHtml(val)}</td>`;
                          }).join('')}
                        </tr>
                      `;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            `;
            resultsDiv.innerHTML = html;
            if (JSON.stringify(data.results).includes('ACT{')) showToast('SECRET DATA LEAKED!', 'success');
          }
        } else {
          resultsDiv.innerHTML = `
            <div class="card mt-5" style="border-color:var(--neon-pink); background: rgba(255,0,85,0.05); padding: 2rem;">
              <div class="text-xs text-pink font-bold mb-3 uppercase tracking-widest">SQL EXECUTION ERROR</div>
              <pre style="font-family:'Share Tech Mono'; font-size:14px; color:#ff80ab; white-space: pre-wrap; background: black; padding: 1rem; border-radius: 8px;">${data.error}</pre>
              <p class="mt-4 text-xs text-dim">Hint: The number of columns in your UNION SELECT must match the original query (4 columns).</p>
            </div>
          `;
        }
      } catch (err) {
        showToast('System connection failure', 'error');
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
        }
      } catch (err) {}
    }
    initAuth();
    updatePreview();
  </script>
</body>
</html>
