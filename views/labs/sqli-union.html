<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQLi UNION Extraction - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .table-responsive { overflow-x: auto; border: 1px solid var(--border-color); border-radius: 8px; background: rgba(0,0,0,0.2); }
    table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; font-size: 13px; }
    th { text-align: left; padding: 12px; background: rgba(0, 240, 255, 0.05); color: var(--neon-cyan); border-bottom: 1px solid var(--border-color); }
    td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #ccc; }
    .highlight-flag { color: var(--neon-yellow); font-weight: bold; }
  </style>
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="container">
      <!-- HEADER -->
      <header style="text-align: center; margin-bottom: 3rem;">
        <div class="badge badge-sqli">MISSION: DATA EXFILTRATION</div>
        <h1 class="hero-title" style="font-size: 3rem; margin-top: 1rem;">UNION SELECT ATTACK</h1>
        <p class="text-secondary">Combine query results to leak sensitive information from hidden tables.</p>
      </header>

      <!-- QUERY PREVIEW -->
      <section class="terminal" style="margin-bottom: 2rem;">
        <div class="terminal-header">
          <div class="terminal-dot green"></div>
          <div class="terminal-title">DATABASE QUERY ANALYZER</div>
        </div>
        <div class="terminal-body" style="color: var(--text-secondary); font-size: 13px;">
          SELECT id, title, description, category FROM challenges WHERE title LIKE '%<span id="sqlPreview" style="color:var(--neon-yellow);"></span>%'
        </div>
      </section>

      <!-- SEARCH CARD -->
      <section class="card">
        <form onsubmit="handleSearch(event)">
          <div class="form-group">
            <label class="form-label">Search / Injection Payload</label>
            <input type="text" id="searchInput" class="form-input" placeholder="Search mission database..." oninput="updatePreview()" autocomplete="off" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">EXECUTE QUERY</button>
        </form>
      </section>

      <!-- RESULTS AREA -->
      <div id="resultsArea" style="margin-top: 2rem;"></div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function updatePreview() {
      document.getElementById('sqlPreview').textContent = document.getElementById('searchInput').value;
    }

    async function handleSearch(e) {
      if (e) e.preventDefault();
      const q = document.getElementById('searchInput').value;
      const resultsDiv = document.getElementById('resultsArea');
      resultsDiv.innerHTML = '<div class="spinner" style="margin: 3rem auto;"></div>';

      try {
        const res = await fetch(`/api/search?q=${q}`);
        const data = await res.json();

        if (data.success) {
          if (data.results.length === 0) {
            resultsDiv.innerHTML = `<div class="card" style="text-align:center; color:var(--text-dim);">NO RECORDS FOUND</div>`;
          } else {
            const keys = Object.keys(data.results[0]);
            resultsDiv.innerHTML = `
              <div class="table-responsive">
                <table>
                  <thead>
                    <tr>${keys.map(k => `<th>${k.toUpperCase()}</th>`).join('')}</tr>
                  </thead>
                  <tbody>
                    ${data.results.map(row => `
                      <tr style="${JSON.stringify(row).includes('ACT{') ? 'background: rgba(255,255,0,0.03);' : ''}">
                        ${keys.map(k => {
                          const val = String(row[k] || '');
                          const isFlag = val.startsWith('ACT{');
                          return `<td class="${isFlag ? 'highlight-flag' : ''}">${escapeHtml(val)}</td>`;
                        }).join('')}
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            `;
            if (JSON.stringify(data.results).includes('ACT{')) showToast('Secret data exfiltrated!', 'success');
          }
        } else {
          resultsDiv.innerHTML = `
            <section class="terminal">
              <div class="terminal-header"><div class="terminal-dot red"></div><div class="terminal-title">SQL ERROR</div></div>
              <div class="terminal-body" style="color: var(--neon-pink);">${data.error}</div>
            </section>
          `;
        }
      } catch (err) { showToast('Connection error', 'error'); }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
        }
      } catch (err) {}
    }
    initAuth();
    updatePreview();
  </script>
</body>
</html>
