<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQLi UNION Extraction - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .lab-container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
    .query-box { background: #05050d; border: 1px solid rgba(0, 255, 255, 0.3); padding: 15px; border-radius: 8px; font-family: 'Share Tech Mono', monospace; font-size: 13px; }
    .results-table-container { overflow-x: auto; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; background: rgba(0, 0, 0, 0.4); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: rgba(0, 255, 255, 0.1); color: var(--neon-cyan); text-align: left; padding: 10px; border-bottom: 1px solid rgba(0, 255, 255, 0.2); }
    td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #ccc; }
    .highlight-row { background: rgba(255, 255, 0, 0.05); }
  </style>
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="lab-container">
      <div class="page-header" style="text-align:center;">
        <h1 style="color: var(--neon-cyan); margin-bottom: 0.5rem;">SQLi UNION EXTRACTION</h1>
        <p class="text-mono">Exfiltrate Hidden Data via UNION SELECT Attacks</p>
      </div>

      <!-- SQL PREVIEW -->
      <div class="query-box">
        <div class="text-xs text-dim mb-2 uppercase tracking-widest">Active Search Query:</div>
        <div class="white">
          <span class="text-dim">SELECT id, title, description, category FROM challenges WHERE title LIKE '%</span><span id="sqlPreview" style="color:var(--neon-yellow);"></span><span class="text-dim">%'</span>
        </div>
      </div>

      <!-- SEARCH FORM -->
      <div class="card" style="padding: 1.5rem; border-color: var(--neon-cyan);">
        <form onsubmit="handleSearch(event)" class="flex gap-3">
          <input type="text" id="searchInput" class="form-input" placeholder="Search mission database..." oninput="updatePreview()" required>
          <button type="submit" class="btn btn-primary" style="background:var(--neon-cyan); border-color:var(--neon-cyan); color:black; font-weight:bold; padding: 0 30px;">
            QUERY
          </button>
        </form>
      </div>

      <!-- RESULTS AREA -->
      <div id="resultsArea" class="flex flex-column gap-3">
        <!-- Table will be injected here -->
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function updatePreview() {
      document.getElementById('sqlPreview').textContent = document.getElementById('searchInput').value;
    }

    async function handleSearch(e) {
      if (e) e.preventDefault();
      const q = document.getElementById('searchInput').value;
      const resultsDiv = document.getElementById('resultsArea');
      resultsDiv.innerHTML = '<div class="spinner"></div>';

      try {
        const res = await fetch(`/api/search?q=${q}`);
        const data = await res.json();

        if (data.success) {
          if (data.results.length === 0) {
            resultsDiv.innerHTML = `<div class="card text-center text-dim">No records found for your query.</div>`;
          } else {
            const keys = Object.keys(data.results[0]);
            let html = `
              <div class="results-table-container">
                <table>
                  <thead>
                    <tr>${keys.map(k => `<th>${k.toUpperCase()}</th>`).join('')}</tr>
                  </thead>
                  <tbody>
                    ${data.results.map(row => `
                      <tr class="${JSON.stringify(row).includes('ACT{') ? 'highlight-row' : ''}">
                        ${keys.map(k => {
                          const val = row[k];
                          const isFlag = String(val).startsWith('ACT{');
                          return `<td class="${isFlag ? 'text-yellow font-bold' : ''}">${escapeHtml(String(val || ''))}</td>`;
                        }).join('')}
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            `;
            resultsDiv.innerHTML = html;
            if (JSON.stringify(data.results).includes('ACT{')) showToast('SECRET DATA DETECTED!', 'success');
          }
        } else {
          resultsDiv.innerHTML = `
            <div class="card" style="border-color:var(--neon-pink); background: rgba(255,0,85,0.05);">
              <div class="text-xs text-pink font-bold mb-2 uppercase">SQL EXECUTION ERROR</div>
              <pre style="font-family:'Share Tech Mono'; font-size:12px; color:#ff80ab; white-space: pre-wrap;">${data.error}</pre>
            </div>
          `;
        }
      } catch (err) {
        showToast('System connection error', 'error');
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        let res = await fetch('/api/auth/status');
        let data = await res.json();
        if (!data.authenticated) {
          const autoRes = await fetch('/api/auth/auto-login', { method: 'POST' });
          data = await autoRes.json();
        }
        if (data.success) {
          document.getElementById('navUser').innerHTML = `
            <span class="nav-user-badge">${data.user.username}</span>
            <button class="nav-logout" onclick="logout()">Logout</button>
          `;
        }
      } catch (err) {}
    }
    initAuth();
    updatePreview();
    function logout() { fetch('/api/auth/logout', { method: 'POST' }).then(() => window.location.href = '/'); }
  </script>
</body>
</html>
