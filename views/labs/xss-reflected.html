<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflected XSS - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="container" style="max-width: 800px;">
      <!-- HEADER -->
      <header style="text-align: center; margin-bottom: 3rem;">
        <div class="badge badge-xss">MISSION: REFLECTED INJECTION</div>
        <h1 class="hero-title" style="font-size: 3rem; margin-top: 1rem;">REFLECTED XSS</h1>
        <p class="text-secondary">Execute client-side scripts via unvalidated URL parameters.</p>
      </header>

      <!-- FLOW BOX -->
      <section class="terminal" style="margin-bottom: 2rem;">
        <div class="terminal-header">
          <div class="terminal-dot cyan"></div>
          <div class="terminal-title">DATA FLOW ANALYSIS</div>
        </div>
        <div class="terminal-body" style="color: var(--text-secondary); font-size: 13px;">
          Source: <span id="sourcePreview" style="color:var(--neon-yellow);"></span> &rarr; Sink: <span style="color:var(--neon-pink);">target.innerHTML</span>
        </div>
      </section>

      <!-- SEARCH CARD -->
      <section class="card">
        <form onsubmit="handleSearch(event)">
          <div class="form-group">
            <label class="form-label">Search Query / XSS Payload</label>
            <input type="text" id="searchInput" class="form-input" placeholder="<script>getFlag()</script>" oninput="updatePreview()" autocomplete="off" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">TRIGGER EXECUTION</button>
        </form>
      </section>

      <!-- RESULT STAGE -->
      <section class="card" style="margin-top: 2rem; min-height: 200px; border-style: dashed;">
        <div class="card-header">
          <h2 class="card-title">Execution Stage (Sink)</h2>
        </div>
        <div id="searchResults" style="padding: 1rem;">
          <div style="text-align: center; color: var(--text-dim); margin-top: 2rem;">[ AWAITING INJECTION ]</div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function updatePreview() {
      document.getElementById('sourcePreview').textContent = document.getElementById('searchInput').value;
    }

    async function handleSearch(e) {
      if (e) e.preventDefault();
      const q = document.getElementById('searchInput').value;
      const resDiv = document.getElementById('searchResults');
      
      resDiv.innerHTML = `
        <div style="margin-bottom: 1rem; color: var(--text-dim); font-size: 11px; text-transform: uppercase;">Rendered Output:</div>
        <div id="target" class="white" style="font-size: 1.1rem;"></div>
      `;
      
      const target = document.getElementById('target');
      // THE VULNERABILITY
      target.innerHTML = q;

      const scripts = target.getElementsByTagName('script');
      for (let s of scripts) {
        try {
          const ns = document.createElement('script');
          ns.text = s.innerText;
          document.body.appendChild(ns).parentNode.removeChild(ns);
        } catch (err) { console.error(err); }
      }
    }

    window.getFlag = function() {
      showToast('XSS Triggered!', 'success');
      document.getElementById('searchResults').innerHTML = `
        <div style="background:rgba(0,255,136,0.1); border:1px solid var(--neon-green); padding:2rem; border-radius:8px; text-align:center; animation: pulse 1.5s infinite;">
          <div style="color: var(--neon-green); font-weight: bold; margin-bottom: 0.5rem; letter-spacing: 2px;">XSS EXPLOIT SUCCESSFUL</div>
          <div style="font-family: 'Share Tech Mono'; color: var(--neon-yellow); font-size: 1.3rem;">ACT{r3fl3ct3d_xss_f0und}</div>
        </div>
      `;
      alert('SUCCESS! FLAG: ACT{r3fl3ct3d_xss_f0und}');
    };

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.success) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
        }
      } catch (err) {}
    }
    initAuth();
  </script>
</body>
</html>
