<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflected XSS - ACT LAB (HTB Edition)</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; }
    .htb-container { max-width: 800px; margin: 4rem auto; }
    .machine-header { border-left: 4px solid var(--neon-green); padding-left: 1.5rem; margin-bottom: 3rem; }
    .machine-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: #fff; }
    
    .htb-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 2.5rem; margin-bottom: 2rem; }
    .htb-card-title { font-size: 1rem; color: var(--neon-green); font-weight: bold; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #23282f; padding-bottom: 0.75rem; }
    
    .htb-input { 
      background: #0b0e11; 
      border: 1px solid #23282f; 
      color: #fff; 
      font-size: 1rem; 
      padding: 1rem; 
      width: 100%; 
      border-radius: 4px; 
      font-family: 'Share Tech Mono', monospace; 
    }
    .htb-input:focus { border-color: var(--neon-green); outline: none; }
    .htb-btn { 
      background: var(--neon-green); 
      color: #000; 
      font-weight: bold; 
      padding: 1rem; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      width: 100%;
    }

    .htb-terminal { background: #050505; border: 1px solid #1c2126; border-radius: 4px; font-family: 'Share Tech Mono', monospace; margin-bottom: 2rem; overflow: hidden; }
    .htb-terminal-header { background: #15191d; padding: 6px 12px; color: #626e84; font-size: 10px; display: flex; justify-content: space-between; }
    .htb-terminal-body { padding: 1rem; color: var(--neon-green); font-size: 12px; line-height: 1.5; }

    .execution-stage { min-height: 200px; background: #0b0e11; border: 1px dashed #23282f; border-radius: 4px; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/act.png" alt="Logo" style="height: 32px; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser"><span class="nav-user-badge">Connecting...</span></div>
  </nav>

  <main class="main-content">
    <div class="htb-container">
      <header class="machine-header">
        <h1 class="machine-title">REFLECTED XSS :: SINK ANALYSIS</h1>
        <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">PHASE: CLIENT-SIDE INJECTION & SCRIPT EXECUTION</p>
      </header>

      <div class="htb-terminal">
        <div class="htb-terminal-header"><span>DATA FLOW MONITOR</span></div>
        <div class="htb-terminal-body">
          <span style="color: #626e84;">SOURCE (URL_PARAM) &rarr; </span><span id="sourcePreview" style="color:var(--neon-yellow);"></span>
        </div>
      </div>

      <!-- SUBMIT FLAG SECTION (MOVED UP) -->
      <section class="htb-card" style="border: 1px solid var(--neon-green); background: rgba(159,239,0,0.02); margin-bottom: 3rem;">
        <h2 class="htb-card-title" style="margin-bottom: 1.2rem; font-size: 0.9rem;">Submit Flag Found</h2>
        <div style="display: flex; gap: 1rem;">
          <input type="text" id="flagInput" class="htb-input" placeholder="ACT{flag_here}" style="flex: 1; height: 45px;">
          <button onclick="submitFlag(3)" class="htb-btn" style="width: auto; padding: 0 1.5rem; height: 45px; font-size: 12px;">Submit Flag</button>
        </div>
      </section>

      <section class="htb-card">
        <h2 class="htb-card-title">Craft Injection Payload</h2>
        <form onsubmit="handleSearch(event)">
          <div class="form-group"><input type="text" id="searchInput" class="htb-input" placeholder="<script>getFlag()</script>" oninput="updatePreview()" autocomplete="off" required></div>
          <button type="submit" class="htb-btn" style="margin-top: 1.5rem;">Fire Exploit</button>
        </form>
      </section>

      <div class="htb-card">
        <h2 class="htb-card-title">Execution Sink Stage</h2>
        <div id="searchResults" class="execution-stage"><div style="color: #626e84; font-size: 13px;">[ AWAITING REFLECTION ]</div></div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function submitFlag(id) {
      const flag = document.getElementById('flagInput').value;
      if (!flag) return showToast('Please enter a flag', 'error');
      try {
        const res = await fetch('/api/challenges/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ challengeId: id, flag: flag }) });
        const data = await res.json();
        if (data.correct) {
          showToast('Correct flag! Points awarded.', 'success');
          // REMOVED AUTO-REDIRECT FOR FREEDOM
        } else { showToast(data.message || 'Incorrect flag', 'error'); }
      } catch (err) {}
    }
    function updatePreview() { document.getElementById('sourcePreview').textContent = document.getElementById('searchInput').value; }
    async function handleSearch(e) {
      if (e) e.preventDefault();
      const q = document.getElementById('searchInput').value;
      const resDiv = document.getElementById('searchResults');
      resDiv.innerHTML = `<div style="width: 100%;"><div id="target" style="color: #fff; font-size: 1.1rem;"></div></div>`;
      const target = document.getElementById('target');
      target.innerHTML = q;
      
      // Universal Detection: Check for suspicious patterns
      const suspicious = /<script|<img|<svg|<details|<iframe|onerror|onload|onclick/i.test(q);
      if (suspicious) {
        setTimeout(getFlag, 500);
      }
      
      const scripts = target.getElementsByTagName('script');
      for (let s of scripts) {
        try { const ns = document.createElement('script'); ns.text = s.innerText; document.body.appendChild(ns).parentNode.removeChild(ns); } catch (err) {}
      }
    }
    window.getFlag = function() {
      showToast('XSS Triggered!', 'success');
      // ALLOW RE-TRIGGERING FLAG UI
      const resDiv = document.getElementById('searchResults');
      const flagDiv = document.createElement('div');
      flagDiv.innerHTML = `<div style="border: 1px solid var(--neon-cyan); background: rgba(0,212,255,0.05); padding: 2rem; border-radius: 4px; text-align: center; width: 100%; margin-top:1rem;"><div style="color: var(--neon-cyan); font-weight: bold; margin-bottom: 1rem; font-size: 12px; letter-spacing: 2px;">[ XSS_VULNERABILITY_CONFIRMED ]</div><div style="font-family: 'Share Tech Mono'; color: var(--neon-yellow); font-size: 1.5rem; font-weight: bold;">ACT{r3fl3ct3d_xss_f0und}</div></div>`;
      resDiv.prepend(flagDiv);
    };
    function showToast(msg, type) { 
      const container = document.getElementById('toastContainer'); 
      container.innerHTML = ''; // CLEAR PREVIOUS TOASTS
      const toast = document.createElement('div'); toast.className = `toast toast-${type}`; toast.textContent = msg; container.appendChild(toast); setTimeout(() => toast.remove(), 3000); 
    }
    // GLOBAL ALERT HIJACK: Any alert() call triggers the Flag
    const oldAlert = window.alert;
    window.alert = function(msg) {
      getFlag();
      console.log('XSS Alert Intercepted:', msg);
    };

    async function initStatus() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.success && !data.user.username.startsWith('guest_')) {
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge" style="border-color:var(--neon-cyan); color:var(--neon-cyan);">Operator: ${data.user.username} (Score: ${data.user.score})</span>`;
        } else {
          const u = data.user || { username: 'Guest', score: 0 };
          document.getElementById('navUser').innerHTML = `
            <span class="nav-user-badge" style="margin-right:10px;">Guest (Score: ${u.score})</span>
            <a href="/login" class="nav-user-badge" style="text-decoration:none; border-color:var(--neon-green); color:var(--neon-green);">Sign In</a>
          `;
        }
      } catch (err) {}
    }
    initStatus();
  </script>
</body>
</html>
