<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stored XSS - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .vertical-container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 3rem; padding: 2rem 0; }
    .giant-input { 
      width: 100%; 
      background: rgba(0,0,0,0.4); 
      border: 2px solid var(--neon-cyan); 
      color: var(--neon-cyan); 
      font-size: 1.4rem; 
      padding: 1.5rem; 
      border-radius: 12px; 
      font-family: 'Share Tech Mono', monospace;
      outline: none;
      margin-bottom: 1.5rem;
    }
    .btn-giant { width: 100%; padding: 1.5rem; font-size: 1.3rem; font-weight: 900; letter-spacing: 5px; background: var(--neon-cyan); color: black; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; }
    .btn-giant:hover { box-shadow: 0 0 30px rgba(0, 255, 255, 0.4); transform: translateY(-3px); }
    .terminal-window { background: #000; border: 1px solid #333; border-radius: 12px; overflow: hidden; width: 100%; }
    .terminal-header { background: #111; color: var(--neon-cyan); padding: 10px 20px; font-size: 12px; font-weight: bold; border-bottom: 1px solid #222; }
    .terminal-body { padding: 20px; height: 150px; overflow-y: auto; font-family: 'Share Tech Mono'; font-size: 14px; color: var(--neon-cyan); }
    .feed-section { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 2.5rem; }
    .entry-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 25px; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="vertical-container">
      <div class="page-header" style="text-align:center;">
        <h1 style="color: var(--neon-cyan); font-size: 3.5rem; text-shadow: 0 0 20px rgba(0, 255, 255, 0.4);">STORED XSS</h1>
        <p class="text-mono" style="font-size: 1.2rem; color: #888; letter-spacing: 3px;">PERMANENT DATABASE PAYLOAD INJECTION</p>
      </div>

      <!-- MAIN EXPLOIT STAGE -->
      <div class="card" style="padding: 3rem; border-color: rgba(0, 255, 255, 0.2); border-width: 2px;">
        <div class="text-xs uppercase text-dim mb-6 tracking-widest font-bold">Insecure Guestbook Submission</div>
        <form onsubmit="postEntry(event)" class="flex flex-column">
          <label class="text-xs text-cyan uppercase mb-3 block font-bold">Author Identity</label>
          <input type="text" id="author" class="giant-input" placeholder="Anonymous Hacker" required>
          
          <label class="text-xs text-cyan uppercase mb-3 block font-bold">Malicious Payload Content</label>
          <textarea id="message" class="giant-input" rows="4" placeholder="<script>alert(document.cookie)</script>" required></textarea>
          
          <button type="submit" class="btn-giant">STORE EXPLOIT IN DATABASE</button>
        </form>
      </div>

      <!-- MONITOR -->
      <div class="terminal-window">
        <div class="terminal-header">DATABASE TRANSACTION MONITOR</div>
        <div class="terminal-body" id="trafficLog">
          <div>System ready. Waiting for persistent write...</div>
        </div>
      </div>

      <!-- LIVE FEED -->
      <div class="feed-section">
        <div class="flex justify-between items-center mb-8">
          <div class="text-xs uppercase text-dim tracking-widest font-bold">Live Global Database Feed</div>
          <div class="text-xs text-cyan">SINK: .innerHTML (UNSAFE)</div>
        </div>
        <div id="entriesList">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function loadEntries() {
      try {
        const res = await fetch('/api/guestbook');
        const data = await res.json();
        const list = document.getElementById('entriesList');
        if (data.success) {
          if (data.entries.length === 0) {
            list.innerHTML = `<div class="text-center text-dim mt-10">NO RECORDS IN DATABASE</div>`;
            return;
          }
          list.innerHTML = data.entries.map(e => `
            <div class="entry-card">
              <div class="flex justify-between mb-4 border-bottom pb-2" style="border-color: rgba(255,255,255,0.05)">
                <span class="text-cyan font-bold uppercase letter-spacing-1">${escapeHtml(e.author)}</span>
                <span class="text-dim text-xs">${new Date(e.created_at).toLocaleTimeString()}</span>
              </div>
              <div id="msg-${e.id}" class="white" style="font-size: 1.3rem; line-height: 1.6; word-break: break-all;"></div>
            </div>
          `).reverse().join('');
          
          data.entries.forEach(e => {
            const container = document.getElementById(`msg-${e.id}`);
            if (container) {
              container.innerHTML = e.message;
              const scripts = container.getElementsByTagName('script');
              for (let s of scripts) {
                const ns = document.createElement('script');
                ns.text = s.innerText;
                document.body.appendChild(ns).parentNode.removeChild(ns);
              }
            }
          });
        }
      } catch (err) {
        addLog('ERROR', 'DB Sync Failed');
      }
    }

    async function postEntry(e) {
      if (e) e.preventDefault();
      const author = document.getElementById('author').value;
      const message = document.getElementById('message').value;
      addLog('WRITE', `Saving entry from ${author}...`);
      try {
        const res = await fetch('/api/guestbook', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ author, message }).toString()
        });
        const data = await res.json();
        if (data.success) {
          showToast('Stored Successfully!', 'success');
          addLog('COMMIT', `Row #${data.id} updated with new payload.`);
          document.getElementById('message').value = '';
          loadEntries();
        }
      } catch (err) { addLog('ERROR', 'Connection failure'); }
    }

    function addLog(type, msg) {
      const log = document.getElementById('trafficLog');
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.style.marginBottom = '8px';
      div.innerHTML = `<span style="color: #444;">[${time}]</span> <span style="font-weight: bold;">[${type}]</span> ${msg}`;
      log.prepend(div);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        let res = await fetch('/api/auth/status');
        let data = await res.json();
        if (data.success) {
          document.cookie = "admin_session=ACT{st0r3d_xss_p3rs1st3nt}; path=/; max-age=3600";
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
          loadEntries();
        }
      } catch (err) {}
    }
    initAuth();
  </script>
</body>
</html>
