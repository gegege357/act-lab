<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stored XSS - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .exploit-container { max-width: 1100px; margin: 0 auto; padding: 2rem 0; display: grid; grid-template-columns: 1fr 1.5fr; gap: 3rem; }
    .giant-input { 
      width: 100%; 
      background: rgba(0,0,0,0.4); 
      border: 2px solid var(--neon-cyan); 
      color: var(--neon-cyan); 
      font-size: 1.2rem; 
      padding: 1rem; 
      border-radius: 12px; 
      font-family: 'Share Tech Mono', monospace;
      outline: none;
    }
    .btn-giant { width: 100%; padding: 1.2rem; font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; background: var(--neon-cyan); color: black; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
    .feed-container { background: rgba(0,0,0,0.3); border: 2px solid rgba(0, 255, 255, 0.1); border-radius: 15px; padding: 2rem; min-height: 500px; max-height: 700px; overflow-y: auto; }
    .entry-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 20px; margin-bottom: 1.5rem; transition: 0.3s; }
    .entry-card:hover { border-color: var(--neon-cyan); background: rgba(0, 255, 255, 0.02); }
    .terminal-window { background: #000; border: 1px solid #222; border-radius: 12px; overflow: hidden; margin-top: 2rem; }
    .terminal-header { background: #111; color: var(--neon-cyan); padding: 8px 15px; font-size: 11px; font-weight: bold; border-bottom: 1px solid #222; }
    .terminal-body { padding: 15px; height: 150px; overflow-y: auto; font-family: 'Share Tech Mono'; font-size: 13px; color: var(--neon-cyan); }
  </style>
</head>
<body>
  <div class="cyber-bg"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">ACT</div>
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <span class="nav-user-badge">Connecting...</span>
    </div>
  </nav>

  <main class="main-content">
    <div style="max-width: 1100px; margin: 0 auto; text-align: center; margin-bottom: 3rem;">
      <h1 style="color: var(--neon-cyan); font-size: 3rem; text-shadow: 0 0 20px rgba(0, 255, 255, 0.4);">STORED XSS</h1>
      <p class="text-mono" style="font-size: 1.2rem; color: #888;">PERMANENT DATABASE PAYLOAD INJECTION</p>
    </div>

    <div class="exploit-container">
      <!-- INPUT SECTION -->
      <div class="flex flex-column gap-4">
        <div class="card" style="padding: 2.5rem; border-color: rgba(0, 255, 255, 0.2); border-width: 2px;">
          <div class="text-xs uppercase text-dim mb-4 tracking-widest">New Submission</div>
          <form onsubmit="postEntry(event)" class="flex flex-column gap-4">
            <div class="form-group">
              <label class="text-xs text-cyan uppercase mb-2 block font-bold">Author</label>
              <input type="text" id="author" class="giant-input" placeholder="Anonymous Hacker" required>
            </div>
            <div class="form-group">
              <label class="text-xs text-cyan uppercase mb-2 block font-bold">Injected Payload</label>
              <textarea id="message" class="giant-input" rows="5" placeholder="<script>alert(1)</script>" required></textarea>
            </div>
            <button type="submit" class="btn-giant">STORE IN DATABASE</button>
          </form>
        </div>

        <div class="terminal-window">
          <div class="terminal-header">STORAGE MONITOR :: LOGS</div>
          <div class="terminal-body" id="trafficLog">
            <div>Waiting for DB transaction...</div>
          </div>
        </div>
      </div>

      <!-- FEED SECTION -->
      <div class="feed-container">
        <div class="flex justify-between items-center mb-6">
          <div class="text-xs uppercase text-dim tracking-widest">Live Global Feed</div>
          <div class="text-xs text-cyan font-bold">VULNERABILITY: UNESCAPED OUTPUT</div>
        </div>
        <div id="entriesList">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function loadEntries() {
      try {
        const res = await fetch('/api/guestbook');
        const data = await res.json();
        const list = document.getElementById('entriesList');
        if (data.success) {
          if (data.entries.length === 0) {
            list.innerHTML = `<div class="text-center text-dim mt-10">THE DATABASE IS EMPTY</div>`;
            return;
          }
          
          list.innerHTML = data.entries.map(e => `
            <div class="entry-card">
              <div class="flex justify-between mb-3">
                <span class="text-cyan font-bold uppercase letter-spacing-1">${escapeHtml(e.author)}</span>
                <span class="text-dim text-xs">${new Date(e.created_at).toLocaleTimeString()}</span>
              </div>
              <div id="msg-${e.id}" class="white" style="font-size: 1.1rem; line-height: 1.5; word-break: break-all;"></div>
            </div>
          `).reverse().join('');
          
          data.entries.forEach(e => {
            const container = document.getElementById(`msg-${e.id}`);
            if (container) {
              // EXECUTION SINK
              container.innerHTML = e.message;
              
              const scripts = container.getElementsByTagName('script');
              for (let s of scripts) {
                const ns = document.createElement('script');
                ns.text = s.innerText;
                document.body.appendChild(ns).parentNode.removeChild(ns);
              }
            }
          });
        }
      } catch (err) {
        addLog('ERROR', 'Could not sync with guestbook database');
      }
    }

    async function postEntry(e) {
      if (e) e.preventDefault();
      const author = document.getElementById('author').value;
      const message = document.getElementById('message').value;
      
      addLog('WRITE', `Initiating storage for author: ${author}`);

      try {
        const res = await fetch('/api/guestbook', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ author, message }).toString()
        });
        const data = await res.json();
        if (data.success) {
          showToast('Entry successfully stored!', 'success');
          addLog('COMMIT', `Payload persistent in row #${data.id}`);
          document.getElementById('message').value = '';
          loadEntries();
        }
      } catch (err) {
        addLog('ERROR', 'Network failure during database write');
      }
    }

    function addLog(type, msg) {
      const log = document.getElementById('trafficLog');
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.style.marginBottom = '5px';
      div.innerHTML = `<span style="color: #444;">[${time}]</span> <span style="font-weight: bold;">[${type}]</span> ${msg}`;
      log.prepend(div);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function initAuth() {
      try {
        let res = await fetch('/api/auth/status');
        let data = await res.json();
        if (data.success) {
          // Flag for demonstration
          document.cookie = "admin_session=ACT{st0r3d_xss_p3rs1st3nt}; path=/; max-age=3600";
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${data.user.username}</span>`;
          loadEntries();
        }
      } catch (err) {}
    }
    initAuth();
  </script>
</body>
</html>
