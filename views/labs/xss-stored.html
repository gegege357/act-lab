<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stored XSS - ACT LAB (HTB Edition)</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; }
    .htb-container { max-width: 1000px; margin: 4rem auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 2rem; }
    .machine-header { border-left: 4px solid var(--neon-green); padding-left: 1.5rem; margin-bottom: 3rem; grid-column: span 2; }
    .machine-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: #fff; }
    
    .htb-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 2rem; }
    .htb-card-title { font-size: 1rem; color: var(--neon-green); font-weight: bold; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #23282f; padding-bottom: 0.75rem; }
    
    .htb-input { 
      background: #0b0e11; 
      border: 1px solid #23282f; 
      color: #fff; 
      font-size: 0.95rem; 
      padding: 0.8rem; 
      width: 100%; 
      border-radius: 4px; 
      font-family: 'Share Tech Mono', monospace; 
      margin-top: 0.5rem;
    }
    .htb-input:focus { border-color: var(--neon-green); outline: none; }
    .htb-btn { 
      background: var(--neon-green); 
      color: #000; 
      font-weight: bold; 
      padding: 0.8rem; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      width: 100%;
      margin-top: 1rem;
    }
    
    .htb-terminal { background: #050505; border: 1px solid #1c2126; border-radius: 4px; font-family: 'Share Tech Mono', monospace; margin-top: 1.5rem; overflow: hidden; }
    .htb-terminal-header { background: #15191d; padding: 6px 12px; color: #626e84; font-size: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #1c2126; }
    .htb-terminal-body { padding: 1rem; color: var(--neon-green); font-size: 12px; height: 120px; overflow-y: auto; }

    .guestbook-feed { height: 450px; overflow-y: auto; padding-right: 10px; }
    .entry-card { background: #1a1e23; border: 1px solid #23282f; border-radius: 4px; padding: 1.5rem; margin-bottom: 1rem; }
    .entry-author { color: var(--neon-green); font-weight: bold; font-size: 12px; text-transform: uppercase; }
    
    @media (max-width: 900px) { .htb-container { grid-template-columns: 1fr; } .machine-header { grid-column: span 1; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/act.png" alt="Logo" style="height: 32px; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser"><span class="nav-user-badge">Connecting...</span></div>
  </nav>

  <main class="main-content">
    <div class="htb-container">
      <header class="machine-header">
        <h1 class="machine-title">STORED XSS :: GUESTBOOK</h1>
        <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">PHASE: DATA PERSISTENCE & INJECTION</p>
      </header>

      <!-- SUBMIT FLAG SECTION (MOVED UP) -->
      <section class="htb-card" style="grid-column: span 2; border: 1px solid var(--neon-green); background: rgba(159,239,0,0.02); margin-bottom: 1rem;">
        <h2 class="htb-card-title" style="margin-bottom: 1.2rem; font-size: 0.9rem;">Submit Flag Found</h2>
        <div style="display: flex; gap: 1rem;">
          <input type="text" id="flagInput" class="htb-input" placeholder="ACT{flag_here}" style="flex: 1; height: 45px; margin-top: 0;">
          <button onclick="submitFlag(4)" class="htb-btn" style="width: auto; padding: 0 1.5rem; height: 45px; font-size: 12px; margin-top: 0;">Submit Flag</button>
        </div>
      </section>

      <!-- INPUT SECTION -->
      <section>
        <div class="htb-card">
          <h2 class="htb-card-title">Commit Payload</h2>
          <form onsubmit="postEntry(event)">
            <div class="form-group" style="margin-bottom: 1.5rem;">
              <label class="form-label">Author Identity</label>
              <input type="text" id="author" class="htb-input" placeholder="Anonymous" required>
            </div>
            <div class="form-group">
              <label class="form-label">Malicious Script</label>
              <textarea id="message" class="htb-input" rows="5" placeholder="<script>alert(1)</script>" required></textarea>
            </div>
            <button type="submit" class="htb-btn">Push to DB</button>
          </form>
        </div>
        <div class="htb-terminal">
          <div class="htb-terminal-header"><span>STORAGE MONITOR</span></div>
          <div class="htb-terminal-body" id="trafficLog"><div>Engine ready...</div></div>
        </div>
      </section>

      <!-- FEED SECTION -->
      <section class="htb-card">
        <h2 class="htb-card-title">Live Global Feed</h2>
        <div id="entriesList" class="guestbook-feed"><div class="spinner"></div></div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function submitFlag(id) {
      const flag = document.getElementById('flagInput').value;
      if (!flag) return showToast('Please enter a flag', 'error');
      try {
        const res = await fetch('/api/challenges/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ challengeId: id, flag: flag }) });
        const data = await res.json();
        if (data.correct) {
          showToast('Correct flag!', 'success');
          setTimeout(() => window.location.href = '/dashboard', 1500);
        } else { showToast(data.message || 'Incorrect flag', 'error'); }
      } catch (err) {}
    }
    async function loadEntries() {
      try {
        const res = await fetch('/api/guestbook');
        const data = await res.json();
        const list = document.getElementById('entriesList');
        if (data.success) {
          if (data.entries.length === 0) { list.innerHTML = `<div style="text-align:center; padding: 3rem; color: #626e84;">[ EMPTY ]</div>`; return; }
          list.innerHTML = data.entries.map(e => `<div class="entry-card"><div style="display: flex; justify-content: space-between; margin-bottom: 1rem; border-bottom: 1px solid #23282f; padding-bottom: 0.5rem;"><span class="entry-author">${escapeHtml(e.author)}</span></div><div id="msg-${e.id}" style="color: #fff; font-size: 13px;"></div></div>`).reverse().join('');
          
          let hasXss = false;
          data.entries.forEach(e => {
            const container = document.getElementById(`msg-${e.id}`);
            if (container) {
              container.innerHTML = e.message;
              if (/<script|<img|<svg|<details|<iframe|onerror|onload|onclick/i.test(e.message)) hasXss = true;
              const scripts = container.getElementsByTagName('script');
              for (let s of scripts) { const ns = document.createElement('script'); ns.text = s.innerText; document.body.appendChild(ns).parentNode.removeChild(ns); }
            }
          });
          
          if (hasXss) {
            const flagDiv = document.createElement('div');
            flagDiv.innerHTML = `<div style="border: 1px solid var(--neon-cyan); background: rgba(0,212,255,0.05); padding: 1.5rem; border-radius: 4px; text-align: center; margin-top: 1rem;"><div style="color: var(--neon-cyan); font-weight: bold; margin-bottom: 0.5rem; font-size: 11px; letter-spacing: 2px;">[ PERSISTENT_XSS_DETECTED ]</div><div style="font-family: 'Share Tech Mono'; color: var(--neon-yellow); font-size: 1.3rem; font-weight: bold;">ACT{st0r3d_xss_m4st3r}</div></div>`;
            list.prepend(flagDiv);
          }
        }
      } catch (err) {}
    }
    async function postEntry(e) {
      if (e) e.preventDefault();
      const author = document.getElementById('author').value;
      const message = document.getElementById('message').value;
      try {
        const res = await fetch('/api/guestbook', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ author, message }).toString() });
        const data = await res.json();
        if (data.success) { showToast('Stored!', 'success'); document.getElementById('message').value = ''; loadEntries(); }
      } catch (err) {}
    }
    function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
    function showToast(msg, type) { const container = document.getElementById('toastContainer'); const toast = document.createElement('div'); toast.className = `toast toast-${type}`; toast.textContent = msg; container.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
    async function initStatus() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        const u = data.user || { username: 'Guest', score: 0 };
        document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">Lab Access: ${u.username} (Score: ${u.score})</span>`;
        loadEntries();
      } catch (err) {}
    }
    initStatus();
  </script>
</body>
</html>
