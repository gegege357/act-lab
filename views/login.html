<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .login-container { width: 100%; max-width: 400px; z-index: 2; }
    .login-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 3rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .login-logo-section { text-align: center; margin-bottom: 2.5rem; }
    .login-logo-img { height: 60px; margin-bottom: 1rem; }
    .login-brand { font-family: 'Orbitron', sans-serif; color: var(--neon-cyan); font-size: 1.5rem; letter-spacing: 3px; font-weight: 800; text-shadow: 0 0 15px rgba(0,240,255,0.5); }
    .form-group { margin-bottom: 1.5rem; }
    .form-label { color: #626e84; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
    .form-input { background: #0b0e11; border: 1px solid #23282f; color: #fff; padding: 1rem; width: 100%; border-radius: 4px; font-family: 'Share Tech Mono', monospace; }
    .form-input:focus { border-color: var(--neon-cyan); outline: none; }
    .btn-login { background: var(--neon-cyan); color: #000; font-weight: bold; padding: 1rem; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; width: 100%; margin-top: 1rem; }
    .login-footer { text-align: center; margin-top: 2rem; color: #626e84; font-size: 12px; font-family: 'Share Tech Mono'; }
  </style>
</head>
<body>
  <div class="cyber-bg" style="opacity: 0.1;"></div>
  
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo-section">
        <img src="/img/act.png" alt="ACT LAB" class="login-logo-img" onerror="this.style.display='none'">
        <div class="login-brand">ACT LAB</div>
        <p style="color: #626e84; font-size: 11px; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px;">Authentication Required</p>
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">User Identifier</label>
          <input type="text" id="username" class="form-input" placeholder="Enter username" required autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">Access Token</label>
          <input type="password" id="password" class="form-input" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">Initialize Session</button>
      </form>
    </div>
    <div class="login-footer">
      UNAUTHORIZED ACCESS IS PROHIBITED :: ACT_ENVIRONMENT_V4.2
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (data.success) { window.location.href = '/dashboard'; } else { showToast(data.message || 'Access Denied', 'error'); }
      } catch (err) {}
    }
    function showToast(msg, type) { const container = document.getElementById('toastContainer'); const toast = document.createElement('div'); toast.className = `toast toast-${type}`; toast.textContent = msg; container.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
  </script>
</body>
</html>
