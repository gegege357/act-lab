<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; }
    .profile-container { max-width: 900px; margin: 4rem auto; }
    .profile-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem; background: #15191d; padding: 2.5rem; border: 1px solid #23282f; border-radius: 4px; border-left: 4px solid var(--neon-cyan); }
    .profile-avatar-large { width: 120px; height: 120px; background: #0b0e11; border: 2px solid var(--neon-cyan); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; color: var(--neon-cyan); }
    .profile-info-large h1 { font-family: 'Orbitron', sans-serif; color: #fff; margin-bottom: 0.5rem; }
    .profile-info-large p { color: #626e84; font-family: 'Share Tech Mono'; letter-spacing: 1px; }

    .settings-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 2.5rem; }
    .settings-title { font-size: 1.1rem; color: var(--neon-cyan); font-weight: bold; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #23282f; padding-bottom: 1rem; }
    
    .form-group { margin-bottom: 2rem; }
    .form-label { display: block; color: #626e84; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .form-input { background: #0b0e11; border: 1px solid #23282f; color: #fff; padding: 1rem; width: 100%; border-radius: 4px; font-family: 'Share Tech Mono', monospace; }
    .form-input:focus { border-color: var(--neon-cyan); outline: none; }
    .btn-save { background: var(--neon-cyan); color: #000; font-weight: bold; padding: 1rem 2rem; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; width: 100%; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <img src="/img/act.png" alt="Logo" style="height: 32px; border-radius: 4px; margin-right: 10px;" onerror="this.style.display='none'">
      <span class="nav-logo-text">ACT LAB</span>
    </a>
    <ul class="nav-links">
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/challenges">Missions</a></li>
      <li><a href="/profile" class="active">Profile</a></li>
    </ul>
    <div class="nav-user" id="navUser"><span class="nav-user-badge">Connecting...</span></div>
  </nav>

  <main class="main-content">
    <div class="profile-container">
      <div class="profile-header">
        <div class="profile-avatar-large" id="avatarChar">?</div>
        <div class="profile-info-large">
          <h1 id="profileUsername">LOADING...</h1>
          <p id="profileScoreLabel">0 POINTS TOTAL</p>
        </div>
      </div>

      <div class="settings-card">
        <h2 class="settings-title">Identity Parameters</h2>
        <form id="profileForm" onsubmit="handleUpdate(event)">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="user@example.com">
          </div>
          <div class="form-group">
            <label class="form-label">Mission Biography</label>
            <textarea id="bio" class="form-input" rows="4" placeholder="Tell us about your specialization..."></textarea>
          </div>
          <button type="submit" class="btn-save">Update Profile</button>
        </form>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function loadProfile() {
      try {
        const res = await fetch('/api/profile/me');
        const data = await res.json();
        if (data.success) {
          const u = data.user;
          document.getElementById('profileUsername').textContent = u.username.toUpperCase();
          document.getElementById('profileScoreLabel').textContent = `${u.score || 0} POINTS TOTAL`;
          document.getElementById('avatarChar').textContent = u.username[0].toUpperCase();
          document.getElementById('email').value = u.email || '';
          document.getElementById('bio').value = u.bio || '';
          document.getElementById('navUser').innerHTML = `<span class="nav-user-badge">${u.username} (Score: ${u.score || 0})</span>`;
        }
      } catch (err) {}
    }

    async function handleUpdate(e) {
      if (e) e.preventDefault();
      const email = document.getElementById('email').value;
      const bio = document.getElementById('bio').value;
      try {
        const res = await fetch('/api/profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, bio }) });
        const data = await res.json();
        if (data.success) { showToast('Parameters Updated!', 'success'); loadProfile(); }
      } catch (err) { showToast('Update failed', 'error'); }
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div'); toast.className = `toast toast-${type}`; toast.textContent = msg; container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    loadProfile();
  </script>
</body>
</html>
