<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ACT LAB</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #0b0e11; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
    .auth-card { background: #15191d; border: 1px solid #23282f; border-radius: 4px; padding: 3rem; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; z-index: 2; }
    .auth-title { color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1.5rem; text-align: center; margin-bottom: 2rem; letter-spacing: 2px; }
    .auth-input { background: #0b0e11; border: 1px solid #23282f; border-radius: 4px; color: #fff; width: 100%; padding: 1rem; margin-bottom: 1.5rem; font-family: 'Share Tech Mono', monospace; }
    .auth-input:focus { border-color: var(--neon-cyan); outline: none; }
    .auth-btn { background: var(--neon-cyan); color: #000; border: none; border-radius: 4px; width: 100%; padding: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
    .auth-btn:hover { background: #00aacc; box-shadow: 0 0 20px rgba(0,212,255,0.4); }
    .auth-link { color: #626e84; text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
    .auth-link a { color: var(--neon-cyan); text-decoration: none; font-weight: bold; }
    .auth-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="cyber-bg"></div>
  
  <div class="auth-card">
    <div style="text-align: center; margin-bottom: 1.5rem;">
      <img src="/img/act.png" alt="Logo" style="height: 50px; border-radius: 4px;">
    </div>
    <h1 class="auth-title">CREATE_ACCOUNT</h1>
    <form id="registerForm" onsubmit="handleRegister(event)">
      <input type="text" id="username" class="auth-input" placeholder="USERNAME" required autocomplete="off">
      <input type="password" id="password" class="auth-input" placeholder="PASSWORD" required>
      <input type="password" id="confirmPassword" class="auth-input" placeholder="CONFIRM_PASSWORD" required>
      <button type="submit" class="auth-btn">Join ACT LAB</button>
    </form>
    <div class="auth-link">
      Already have an account? <a href="/login">Sign In</a>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function handleRegister(e) {
      if (e) e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) return showToast('Passwords do not match', 'error');

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Account created! Entering lab...', 'success');
          setTimeout(() => window.location.href = '/challenges', 1500);
        } else {
          showToast(data.error || 'Registration failed', 'error');
        }
      } catch (err) {
        showToast('Error connecting to server', 'error');
      }
    }

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      container.innerHTML = '';
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
